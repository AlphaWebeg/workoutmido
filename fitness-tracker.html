<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>مدرّبك الشخصي | WorkoutMido</title>
  <meta name="description" content="تطبيق متكامل للتدريب والتغذية - برنامج Upper/Lower بالاستك ووزن الجسم مع خطة غذائية لـ Lean Bulk">

  <!-- Fonts: Inter + Cairo -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;500;600;700;800;900&family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">

  <style>
    /* ===================================
       DESIGN TOKENS
    =================================== */
    :root {
      /* Primary Colors */
      --primary:       #6366f1;
      --primary-dark:  #4f46e5;
      --primary-light: #e0e7ff;
      --primary-glow:  rgba(99,102,241,0.15);

      /* Accent Colors */
      --green:   #10b981;
      --green-bg: #d1fae5;
      --blue:    #3b82f6;
      --blue-bg: #dbeafe;
      --orange:  #f59e0b;
      --orange-bg: #fef3c7;
      --red:     #ef4444;
      --red-bg:  #fee2e2;

      /* Surface / BG */
      --bg:         #f8fafc;
      --surface:    #ffffff;
      --surface-2:  #f1f5f9;
      --card:       #ffffff;

      /* Text */
      --text:        #0f172a;
      --text-2:      #334155;
      --muted:       #64748b;
      --muted-2:     #94a3b8;

      /* Borders */
      --border:      #e2e8f0;
      --border-2:    #cbd5e1;

      /* Radius */
      --r-sm: 8px;
      --r-md: 12px;
      --r-lg: 16px;
      --r-xl: 20px;
      --r-full: 9999px;

      /* Shadows */
      --shadow-sm: 0 1px 2px 0 rgba(0,0,0,0.05);
      --shadow-md: 0 4px 6px -1px rgba(0,0,0,0.07), 0 2px 4px -1px rgba(0,0,0,0.04);
      --shadow-lg: 0 10px 15px -3px rgba(0,0,0,0.08), 0 4px 6px -2px rgba(0,0,0,0.04);
      --shadow-xl: 0 20px 25px -5px rgba(0,0,0,0.08), 0 10px 10px -5px rgba(0,0,0,0.03);

      /* Transitions */
      --t-fast: 150ms ease;
      --t-base: 200ms ease;
      --t-slow: 300ms ease;
    }

    /* ===================================
       RESET & BASE
    =================================== */
    *, *::before, *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    html {
      scroll-behavior: smooth;
    }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'Cairo', sans-serif;
      direction: rtl;
      min-height: 100vh;
      line-height: 1.6;
      -webkit-font-smoothing: antialiased;
    }

    /* ===================================
       LAYOUT
    =================================== */
    .app-wrapper {
      max-width: 720px;
      margin: 0 auto;
      padding: 0 16px 100px;
    }

    /* ===================================
       TOPBAR / HEADER
    =================================== */
    .topbar {
      position: sticky;
      top: 0;
      z-index: 50;
      background: rgba(248,250,252,0.9);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      border-bottom: 1px solid var(--border);
      padding: 0 16px;
    }

    .topbar-inner {
      max-width: 720px;
      margin: 0 auto;
      display: flex;
      align-items: center;
      justify-content: space-between;
      height: 60px;
    }

    .logo {
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .logo-icon {
      width: 36px;
      height: 36px;
      background: linear-gradient(135deg, var(--primary), var(--primary-dark));
      border-radius: var(--r-md);
      display: flex;
      align-items: center;
      justify-content: center;
      box-shadow: 0 2px 8px var(--primary-glow);
    }

    .logo-icon svg {
      width: 20px;
      height: 20px;
      fill: white;
    }

    .logo-text {
      font-weight: 800;
      font-size: 1.05rem;
      color: var(--text);
      letter-spacing: -0.3px;
    }

    .logo-sub {
      font-size: 0.7rem;
      color: var(--muted);
      font-weight: 500;
      margin-top: -2px;
    }

    .topbar-date {
      font-size: 0.78rem;
      color: var(--muted);
      font-weight: 600;
      background: var(--surface-2);
      padding: 4px 10px;
      border-radius: var(--r-full);
      border: 1px solid var(--border);
    }

    /* ===================================
       DAY SELECTOR STRIP
    =================================== */
    .day-strip {
      padding: 12px 0 4px;
    }

    .day-strip-scroll {
      display: flex;
      gap: 6px;
      overflow-x: auto;
      scrollbar-width: none;
      padding-bottom: 4px;
    }

    .day-strip-scroll::-webkit-scrollbar { display: none; }

    .day-chip {
      flex: 0 0 auto;
      padding: 6px 14px;
      background: var(--surface);
      border: 1.5px solid var(--border);
      border-radius: var(--r-full);
      color: var(--muted);
      font-family: 'Cairo', sans-serif;
      font-size: 0.82rem;
      font-weight: 700;
      cursor: pointer;
      transition: all var(--t-base);
      white-space: nowrap;
      display: flex;
      align-items: center;
      gap: 5px;
    }

    .day-chip:hover {
      border-color: var(--primary);
      color: var(--primary);
      background: var(--primary-light);
    }

    .day-chip.active {
      background: var(--primary);
      border-color: var(--primary);
      color: white;
      box-shadow: 0 2px 8px var(--primary-glow);
    }

    .day-chip.rest-day.active {
      background: var(--muted);
      border-color: var(--muted);
    }

    .day-dot {
      width: 6px;
      height: 6px;
      border-radius: 50%;
      background: #ef4444;
      display: inline-block;
    }

    /* ===================================
       WORKOUT SUMMARY CARD
    =================================== */
    .workout-hero {
      background: linear-gradient(135deg, var(--primary) 0%, var(--primary-dark) 100%);
      border-radius: var(--r-xl);
      padding: 20px 22px;
      margin: 12px 0;
      color: white;
      position: relative;
      overflow: hidden;
    }

    .workout-hero::before {
      content: '';
      position: absolute;
      top: -30px;
      left: -30px;
      width: 120px;
      height: 120px;
      background: rgba(255,255,255,0.07);
      border-radius: 50%;
    }

    .workout-hero::after {
      content: '';
      position: absolute;
      bottom: -20px;
      right: -20px;
      width: 90px;
      height: 90px;
      background: rgba(255,255,255,0.05);
      border-radius: 50%;
    }

    .workout-hero-content {
      position: relative;
      z-index: 1;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    .workout-hero-label {
      font-size: 1.4rem;
      font-weight: 800;
      letter-spacing: -0.5px;
      margin-bottom: 4px;
    }

    .workout-hero-sub {
      font-size: 0.82rem;
      opacity: 0.85;
      font-weight: 500;
    }

    .workout-hero-badge {
      background: rgba(255,255,255,0.2);
      border: 1px solid rgba(255,255,255,0.3);
      backdrop-filter: blur(4px);
      padding: 6px 14px;
      border-radius: var(--r-full);
      font-size: 0.78rem;
      font-weight: 700;
      white-space: nowrap;
    }

    .rest-hero {
      background: linear-gradient(135deg, #64748b 0%, #475569 100%);
    }

    /* ===================================
       TAB NAVIGATION
    =================================== */
    .tab-nav {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 6px;
      margin: 12px 0;
      background: var(--surface);
      padding: 5px;
      border-radius: var(--r-lg);
      border: 1px solid var(--border);
    }

    .tab-nav-btn {
      padding: 10px 16px;
      background: transparent;
      border: none;
      border-radius: var(--r-md);
      color: var(--muted);
      font-family: 'Cairo', sans-serif;
      font-size: 0.9rem;
      font-weight: 700;
      cursor: pointer;
      transition: all var(--t-base);
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 6px;
    }

    .tab-nav-btn:hover {
      background: var(--surface-2);
      color: var(--text);
    }

    .tab-nav-btn.active {
      background: var(--primary);
      color: white;
      box-shadow: 0 2px 8px var(--primary-glow);
    }

    .tab-nav-btn svg {
      width: 16px;
      height: 16px;
      flex-shrink: 0;
    }

    /* ===================================
       SECTION HEADING
    =================================== */
    .section-heading {
      font-size: 0.8rem;
      font-weight: 700;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: 0.8px;
      margin: 20px 0 10px;
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .section-heading::after {
      content: '';
      flex: 1;
      height: 1px;
      background: var(--border);
    }

    /* ===================================
       EXERCISE CARD
    =================================== */
    .ex-list {
      display: flex;
      flex-direction: column;
      gap: 8px;
      margin-bottom: 16px;
    }

    .ex-card {
      background: var(--surface);
      border: 1.5px solid var(--border);
      border-radius: var(--r-lg);
      overflow: hidden;
      transition: all var(--t-base);
      box-shadow: var(--shadow-sm);
    }

    .ex-card:hover {
      border-color: var(--border-2);
      box-shadow: var(--shadow-md);
    }

    .ex-card.open {
      border-color: var(--primary);
      box-shadow: 0 0 0 3px var(--primary-glow);
    }

    .ex-header {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 14px 16px;
      cursor: pointer;
      user-select: none;
    }

    .ex-num-badge {
      width: 28px;
      height: 28px;
      background: var(--surface-2);
      border-radius: var(--r-sm);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 0.78rem;
      font-weight: 800;
      color: var(--muted);
      flex-shrink: 0;
    }

    .ex-card.open .ex-num-badge {
      background: var(--primary-light);
      color: var(--primary);
    }

    .ex-info {
      flex: 1;
      min-width: 0;
    }

    .ex-name {
      font-weight: 800;
      font-size: 0.95rem;
      color: var(--text);
      margin-bottom: 5px;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .ex-tags {
      display: flex;
      gap: 5px;
      flex-wrap: wrap;
    }

    .tag {
      font-size: 0.7rem;
      font-weight: 700;
      padding: 2px 8px;
      border-radius: var(--r-full);
    }

    .tag-muscle {
      background: var(--primary-light);
      color: var(--primary-dark);
    }

    .tag-tool {
      background: var(--surface-2);
      color: var(--muted);
    }

    .ex-right {
      display: flex;
      align-items: center;
      gap: 10px;
      flex-shrink: 0;
    }

    .ex-stats-row {
      display: flex;
      gap: 8px;
    }

    .stat-chip {
      text-align: center;
      font-size: 0.7rem;
      color: var(--muted);
    }

    .stat-chip strong {
      display: block;
      font-size: 0.88rem;
      color: var(--text);
      font-weight: 800;
      line-height: 1.2;
    }

    .ex-toggle-btn {
      width: 30px;
      height: 30px;
      background: var(--surface-2);
      border: none;
      border-radius: var(--r-sm);
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: all var(--t-base);
      flex-shrink: 0;
      color: var(--muted);
    }

    .ex-toggle-btn:hover {
      background: var(--primary-light);
      color: var(--primary);
    }

    .ex-card.open .ex-toggle-btn {
      background: var(--primary);
      color: white;
      transform: rotate(180deg);
    }

    .ex-toggle-btn svg {
      width: 14px;
      height: 14px;
    }

    /* ===================================
       EXERCISE MEDIA PANEL
    =================================== */
    .ex-media-panel {
      border-top: 1px solid var(--border);
      background: var(--surface-2);
    }

    .media-tab-bar {
      display: flex;
      border-bottom: 1px solid var(--border);
      background: var(--surface);
    }

    .media-tab-btn {
      flex: 1;
      padding: 10px;
      background: transparent;
      border: none;
      border-bottom: 2px solid transparent;
      color: var(--muted);
      font-family: 'Cairo', sans-serif;
      font-size: 0.82rem;
      font-weight: 700;
      cursor: pointer;
      transition: all var(--t-base);
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 5px;
    }

    .media-tab-btn.active {
      color: var(--primary);
      border-bottom-color: var(--primary);
    }

    .media-tab-btn svg {
      width: 14px;
      height: 14px;
    }

    .media-content {
      padding: 16px;
    }

    .gif-container {
      background: white;
      border-radius: var(--r-md);
      border: 1px solid var(--border);
      overflow: hidden;
      min-height: 220px;
      display: flex;
      align-items: center;
      justify-content: center;
      margin-bottom: 12px;
    }

    .gif-container img {
      max-height: 280px;
      max-width: 100%;
      object-fit: contain;
      display: block;
    }

    .gif-placeholder {
      text-align: center;
      padding: 40px 20px;
      color: var(--muted);
    }

    .gif-placeholder-icon {
      font-size: 3rem;
      margin-bottom: 10px;
    }

    .gif-placeholder p {
      font-size: 0.82rem;
      font-weight: 600;
      color: var(--muted-2);
    }

    .video-container {
      position: relative;
      padding-bottom: 56.25%;
      height: 0;
      overflow: hidden;
      border-radius: var(--r-md);
      background: #000;
      margin-bottom: 12px;
    }

    .video-container iframe {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      border: none;
    }

    .video-container.video-placeholder {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 12px;
      min-height: 200px;
      padding-bottom: 0;
      height: auto;
      cursor: pointer;
      background: linear-gradient(135deg, #1e293b 0%, #0f172a 100%);
      transition: background var(--t-base);
    }

    .video-container.video-placeholder:hover {
      background: linear-gradient(135deg, #334155 0%, #1e293b 100%);
    }

    .video-play-btn {
      width: 64px;
      height: 64px;
      border-radius: 50%;
      background: var(--primary);
      border: none;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      box-shadow: 0 4px 20px rgba(99, 102, 241, 0.4);
      transition: transform var(--t-base), box-shadow var(--t-base);
    }

    .video-container.video-placeholder:hover .video-play-btn {
      transform: scale(1.05);
      box-shadow: 0 6px 24px rgba(99, 102, 241, 0.5);
    }

    .video-play-btn svg {
      width: 28px;
      height: 28px;
      color: white;
      margin-right: -3px;
    }

    .video-play-label {
      font-size: 0.82rem;
      font-weight: 600;
      color: #94a3b8;
    }

    .ex-detail-grid {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 8px;
    }

    .ex-detail-chip {
      background: white;
      border: 1px solid var(--border);
      border-radius: var(--r-md);
      padding: 10px 8px;
      text-align: center;
    }

    .ex-detail-chip .dval {
      font-size: 1rem;
      font-weight: 800;
      color: var(--text);
      margin-bottom: 2px;
    }

    .ex-detail-chip .dlbl {
      font-size: 0.68rem;
      color: var(--muted);
      font-weight: 600;
    }

    /* ===================================
       REST CARD
    =================================== */
    .rest-card {
      background: linear-gradient(135deg, #f8fafc, #f1f5f9);
      border: 1.5px solid var(--border);
      border-radius: var(--r-xl);
      padding: 48px 24px;
      text-align: center;
      margin-bottom: 16px;
    }

    .rest-card-icon {
      font-size: 3.5rem;
      margin-bottom: 16px;
      animation: float 3s ease-in-out infinite;
    }

    @keyframes float {
      0%, 100% { transform: translateY(0); }
      50% { transform: translateY(-8px); }
    }

    .rest-card h2 {
      font-size: 1.3rem;
      font-weight: 800;
      color: var(--text);
      margin-bottom: 8px;
    }

    .rest-card p {
      font-size: 0.88rem;
      color: var(--muted);
      line-height: 1.7;
    }

    .rest-tips {
      display: flex;
      flex-direction: column;
      gap: 8px;
      margin-top: 20px;
      text-align: right;
    }

    .rest-tip-item {
      display: flex;
      align-items: center;
      gap: 10px;
      background: white;
      border: 1px solid var(--border);
      border-radius: var(--r-md);
      padding: 10px 14px;
    }

    .rest-tip-icon {
      width: 32px;
      height: 32px;
      border-radius: var(--r-sm);
      background: var(--primary-light);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 1rem;
      flex-shrink: 0;
    }

    .rest-tip-text {
      font-size: 0.85rem;
      font-weight: 600;
      color: var(--text-2);
    }

    /* ===================================
       TIP BOX
    =================================== */
    .tip-box {
      background: linear-gradient(135deg, var(--primary-light), #ede9fe);
      border: 1px solid #c7d2fe;
      border-radius: var(--r-lg);
      padding: 14px 16px;
      font-size: 0.85rem;
      font-weight: 600;
      color: var(--primary-dark);
      display: flex;
      align-items: flex-start;
      gap: 10px;
      line-height: 1.6;
      margin-bottom: 12px;
    }

    .tip-box-icon {
      font-size: 1.2rem;
      flex-shrink: 0;
      margin-top: 1px;
    }

    /* ===================================
       MACRO CARDS
    =================================== */
    .macro-grid {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 8px;
      margin-bottom: 16px;
    }

    .macro-card {
      background: var(--surface);
      border: 1.5px solid var(--border);
      border-radius: var(--r-lg);
      padding: 14px 10px;
      text-align: center;
      transition: all var(--t-base);
      cursor: default;
    }

    .macro-card:hover {
      transform: translateY(-2px);
      box-shadow: var(--shadow-md);
    }

    .macro-val {
      font-size: 1.35rem;
      font-weight: 900;
      line-height: 1.1;
      margin-bottom: 3px;
    }

    .macro-label {
      font-size: 0.72rem;
      font-weight: 700;
      color: var(--muted);
    }

    .macro-target {
      font-size: 0.65rem;
      color: var(--muted-2);
      margin-top: 3px;
    }

    .macro-bar {
      height: 4px;
      background: var(--surface-2);
      border-radius: var(--r-full);
      margin-top: 8px;
      overflow: hidden;
    }

    .macro-bar-fill {
      height: 100%;
      border-radius: var(--r-full);
      transition: width 0.8s cubic-bezier(0.4, 0, 0.2, 1);
    }

    .mac-cal .macro-val { color: #f59e0b; }
    .mac-cal .macro-bar-fill { background: linear-gradient(90deg, #fbbf24, #f59e0b); }
    .mac-cal { border-top: 3px solid #f59e0b; }

    .mac-pro .macro-val { color: #3b82f6; }
    .mac-pro .macro-bar-fill { background: linear-gradient(90deg, #60a5fa, #3b82f6); }
    .mac-pro { border-top: 3px solid #3b82f6; }

    .mac-carb .macro-val { color: #10b981; }
    .mac-carb .macro-bar-fill { background: linear-gradient(90deg, #34d399, #10b981); }
    .mac-carb { border-top: 3px solid #10b981; }

    .mac-fat .macro-val { color: #8b5cf6; }
    .mac-fat .macro-bar-fill { background: linear-gradient(90deg, #a78bfa, #8b5cf6); }
    .mac-fat { border-top: 3px solid #8b5cf6; }

    /* ===================================
       MEAL CARDS
    =================================== */
    .meals-list {
      display: flex;
      flex-direction: column;
      gap: 10px;
      margin-bottom: 20px;
    }

    .meal-card {
      background: var(--surface);
      border: 1.5px solid var(--border);
      border-radius: var(--r-lg);
      overflow: hidden;
      transition: all var(--t-base);
      box-shadow: var(--shadow-sm);
    }

    .meal-card.open {
      box-shadow: var(--shadow-md);
    }

    .meal-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 14px 16px;
      cursor: pointer;
      user-select: none;
      transition: background var(--t-base);
    }

    .meal-header:hover {
      background: var(--surface-2);
    }

    .meal-header-left {
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .meal-icon {
      width: 36px;
      height: 36px;
      border-radius: var(--r-md);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 1.1rem;
    }

    .meal-icon.breakfast { background: #fef3c7; }
    .meal-icon.preworkout { background: #dbeafe; }
    .meal-icon.postworkout { background: #d1fae5; }
    .meal-icon.lunch { background: #fce7f3; }
    .meal-icon.dinner { background: #ede9fe; }

    .meal-name {
      font-weight: 800;
      font-size: 0.92rem;
      color: var(--text);
      margin-bottom: 2px;
    }

    .meal-cal-preview {
      font-size: 0.75rem;
      color: var(--muted);
      font-weight: 600;
    }

    .meal-header-right {
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .meal-total-badge {
      background: var(--surface-2);
      color: var(--text-2);
      font-size: 0.78rem;
      font-weight: 800;
      padding: 3px 10px;
      border-radius: var(--r-full);
      border: 1px solid var(--border);
    }

    .meal-chevron {
      color: var(--muted-2);
      transition: transform var(--t-base);
    }

    .meal-card.open .meal-chevron {
      transform: rotate(180deg);
    }

    .meal-chevron svg {
      width: 16px;
      height: 16px;
    }

    .meal-body {
      border-top: 1px solid var(--border);
      padding: 4px 0 8px;
    }

    .food-row {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 10px 16px;
      border-bottom: 1px solid var(--border);
      transition: background var(--t-fast);
    }

    .food-row:last-child {
      border-bottom: none;
    }

    .food-row:hover {
      background: var(--surface-2);
    }

    .food-info {
      flex: 1;
      min-width: 0;
    }

    .food-name {
      font-size: 0.88rem;
      font-weight: 700;
      color: var(--text);
      margin-bottom: 3px;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .food-macros {
      font-size: 0.72rem;
      color: var(--muted);
      font-weight: 600;
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
    }

    .food-macros span {
      display: flex;
      align-items: center;
      gap: 2px;
    }

    .gram-wrapper {
      display: flex;
      align-items: center;
      gap: 4px;
      flex-shrink: 0;
    }

    .gram-input {
      width: 58px;
      padding: 5px 6px;
      background: var(--surface-2);
      border: 1.5px solid var(--border);
      color: var(--text);
      font-family: 'Cairo', sans-serif;
      font-size: 0.82rem;
      font-weight: 700;
      text-align: center;
      border-radius: var(--r-sm);
      transition: all var(--t-base);
    }

    .gram-input:focus {
      outline: none;
      border-color: var(--primary);
      background: var(--primary-light);
    }

    .gram-unit {
      font-size: 0.72rem;
      color: var(--muted);
      font-weight: 600;
    }

    .swap-btn {
      padding: 5px 10px;
      background: transparent;
      border: 1.5px solid var(--border);
      color: var(--muted);
      font-family: 'Cairo', sans-serif;
      font-size: 0.72rem;
      font-weight: 700;
      cursor: pointer;
      border-radius: var(--r-sm);
      transition: all var(--t-base);
      white-space: nowrap;
      flex-shrink: 0;
    }

    .swap-btn:hover {
      border-color: var(--primary);
      color: var(--primary);
      background: var(--primary-light);
    }

    .meal-summary-row {
      display: flex;
      gap: 12px;
      padding: 10px 16px 4px;
      border-top: 1px solid var(--border);
      flex-wrap: wrap;
    }

    .meal-summary-item {
      font-size: 0.78rem;
      font-weight: 700;
      color: var(--muted);
    }

    .meal-summary-item span {
      font-weight: 800;
    }

    /* ===================================
       MODAL
    =================================== */
    .modal-overlay {
      position: fixed;
      inset: 0;
      background: rgba(15,23,42,0.5);
      backdrop-filter: blur(4px);
      -webkit-backdrop-filter: blur(4px);
      display: flex;
      align-items: flex-end;
      justify-content: center;
      z-index: 200;
      padding: 0;
      animation: fadeIn 0.2s ease;
    }

    @keyframes fadeIn {
      from { opacity: 0; }
      to { opacity: 1; }
    }

    .modal {
      background: var(--surface);
      border-radius: var(--r-xl) var(--r-xl) 0 0;
      padding: 20px 20px 30px;
      width: 100%;
      max-width: 500px;
      max-height: 80vh;
      overflow-y: auto;
      animation: slideUp 0.25s cubic-bezier(0.34, 1.56, 0.64, 1);
    }

    @keyframes slideUp {
      from { transform: translateY(100%); }
      to { transform: translateY(0); }
    }

    .modal-handle {
      width: 36px;
      height: 4px;
      background: var(--border-2);
      border-radius: var(--r-full);
      margin: 0 auto 20px;
    }

    .modal-title {
      font-size: 1rem;
      font-weight: 800;
      color: var(--text);
      margin-bottom: 4px;
    }

    .modal-subtitle {
      font-size: 0.8rem;
      color: var(--muted);
      font-weight: 600;
      margin-bottom: 16px;
    }

    .modal-divider {
      height: 1px;
      background: var(--border);
      margin-bottom: 14px;
    }

    .option-btn {
      display: flex;
      align-items: center;
      gap: 12px;
      width: 100%;
      padding: 12px 14px;
      margin-bottom: 6px;
      background: var(--surface-2);
      border: 1.5px solid var(--border);
      color: var(--text);
      font-family: 'Cairo', sans-serif;
      font-size: 0.88rem;
      font-weight: 700;
      cursor: pointer;
      text-align: right;
      border-radius: var(--r-md);
      transition: all var(--t-base);
    }

    .option-btn:hover {
      border-color: var(--primary);
      background: var(--primary-light);
      color: var(--primary-dark);
    }

    .option-icon {
      width: 36px;
      height: 36px;
      background: white;
      border-radius: var(--r-sm);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 1.1rem;
      flex-shrink: 0;
    }

    .option-info {
      flex: 1;
    }

    .option-name {
      font-weight: 800;
      margin-bottom: 2px;
    }

    .option-macros {
      font-size: 0.72rem;
      color: var(--muted);
      font-weight: 600;
    }

    .close-btn {
      margin-top: 8px;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 6px;
      width: 100%;
      padding: 13px;
      background: var(--surface-2);
      border: 1.5px solid var(--border);
      color: var(--muted);
      font-family: 'Cairo', sans-serif;
      font-weight: 700;
      font-size: 0.9rem;
      cursor: pointer;
      border-radius: var(--r-md);
      transition: all var(--t-base);
    }

    .close-btn:hover {
      background: var(--red-bg);
      border-color: #fca5a5;
      color: var(--red);
    }

    /* ===================================
       RESPONSIVE
    =================================== */
    @media (max-width: 600px) {
      .macro-grid { grid-template-columns: repeat(2, 1fr); }
      .ex-stats-row { display: none; }
      .ex-detail-grid { grid-template-columns: repeat(2, 1fr); }
      .workout-hero-badge { display: none; }
    }

    @media (max-width: 380px) {
      .ex-detail-grid { grid-template-columns: repeat(2, 1fr); }
    }

    /* ===================================
       ANIMATIONS
    =================================== */
    .fade-in {
      animation: cardFadeIn 0.3s ease forwards;
    }

    @keyframes cardFadeIn {
      from {
        opacity: 0;
        transform: translateY(8px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    /* ===================================
       SCROLL PROGRESS
    =================================== */
    .scroll-progress {
      position: fixed;
      top: 0;
      right: 0;
      left: 0;
      height: 3px;
      background: var(--border);
      z-index: 100;
    }

    .scroll-progress-bar {
      height: 100%;
      background: linear-gradient(90deg, var(--primary), var(--green));
      transition: width 0.1s linear;
    }

    /* ===================================
       FOOD SYSTEM — Add / Search / Custom
    =================================== */
    .add-food-btn {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 6px;
      width: 100%;
      padding: 9px 14px;
      background: var(--primary-light);
      border: 1.5px dashed var(--primary);
      color: var(--primary);
      font-family: 'Cairo', sans-serif;
      font-size: 0.85rem;
      font-weight: 700;
      cursor: pointer;
      border-radius: var(--r-md);
      transition: all var(--t-base);
    }

    .add-food-btn:hover {
      background: var(--primary);
      color: white;
      border-style: solid;
    }

    /* Food modal category tabs */
    .food-modal-tabs {
      display: flex;
      gap: 5px;
      flex-wrap: wrap;
      margin-bottom: 4px;
    }

    .food-modal-tab {
      padding: 5px 11px;
      background: var(--surface-2);
      border: 1.5px solid var(--border);
      border-radius: var(--r-full);
      font-family: 'Cairo', sans-serif;
      font-size: 0.78rem;
      font-weight: 700;
      color: var(--muted);
      cursor: pointer;
      transition: all var(--t-base);
      white-space: nowrap;
    }

    .food-modal-tab:hover {
      border-color: var(--primary);
      color: var(--primary);
    }

    .food-modal-tab.active {
      background: var(--primary);
      border-color: var(--primary);
      color: white;
    }

    /* Search box */
    .search-box-wrap {
      margin-bottom: 6px;
    }

    .search-box-input {
      width: 100%;
      padding: 10px 14px;
      background: var(--surface-2);
      border: 1.5px solid var(--border);
      border-radius: var(--r-md);
      font-family: 'Cairo', sans-serif;
      font-size: 0.9rem;
      font-weight: 600;
      color: var(--text);
      direction: rtl;
      transition: all var(--t-base);
    }

    .search-box-input:focus {
      outline: none;
      border-color: var(--primary);
      background: var(--primary-light);
    }

    .search-loading {
      text-align: center;
      color: var(--muted);
      font-size: 0.82rem;
      font-weight: 600;
      padding: 10px;
    }

    /* Custom food form */
    .custom-food-form {
      display: flex;
      flex-direction: column;
      gap: 10px;
    }

    .form-title {
      font-size: 0.85rem;
      font-weight: 800;
      color: var(--text);
      margin-bottom: 2px;
    }

    .form-row {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 8px;
    }

    .form-group {
      display: flex;
      flex-direction: column;
      gap: 4px;
    }

    .form-label {
      font-size: 0.72rem;
      font-weight: 700;
      color: var(--muted);
    }

    .form-input {
      width: 100%;
      padding: 8px 10px;
      background: var(--surface-2);
      border: 1.5px solid var(--border);
      border-radius: var(--r-sm);
      font-family: 'Cairo', sans-serif;
      font-size: 0.85rem;
      font-weight: 600;
      color: var(--text);
      direction: rtl;
      transition: all var(--t-base);
    }

    .form-input:focus {
      outline: none;
      border-color: var(--primary);
      background: var(--primary-light);
    }

    .add-confirm-btn {
      width: 100%;
      padding: 12px;
      background: var(--primary);
      border: none;
      border-radius: var(--r-md);
      font-family: 'Cairo', sans-serif;
      font-size: 0.9rem;
      font-weight: 800;
      color: white;
      cursor: pointer;
      transition: all var(--t-base);
      box-shadow: 0 2px 8px var(--primary-glow);
    }

    .add-confirm-btn:hover:not(:disabled) {
      background: var(--primary-dark);
      transform: translateY(-1px);
    }

    .add-confirm-btn:disabled {
      opacity: 0.45;
      cursor: not-allowed;
      box-shadow: none;
      transform: none;
    }

    /* ===================================
       DAILY SUMMARY CARD
       =================================== */
    .daily-summary-card {
      background: var(--surface);
      border: 1.5px solid var(--border);
      border-radius: var(--r-xl);
      padding: 16px 20px;
      margin-bottom: 24px;
      box-shadow: var(--shadow-sm);
      transition: all var(--t-base);
    }

    .daily-summary-card:hover {
      box-shadow: var(--shadow-md);
      border-color: var(--border-2);
    }

    .summary-top {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 16px;
    }

    .summary-metrics {
      display: flex;
      align-items: center;
      gap: 20px;
    }

    .metric-item {
      display: flex;
      flex-direction: column;
      align-items: flex-start;
    }

    .m-val {
      font-size: 1.5rem;
      font-weight: 900;
      color: var(--primary);
      line-height: 1.2;
    }

    .m-lbl {
      font-size: 0.78rem;
      font-weight: 700;
      color: var(--muted);
      margin-top: 2px;
    }

    .metric-divider {
      width: 1.5px;
      height: 38px;
      background: var(--border);
    }

    .summary-progress-circle-wrap {
      position: relative;
      width: 60px;
      height: 60px;
      flex-shrink: 0;
    }

    .summary-progress-circle {
      width: 100%;
      height: 100%;
      transform: rotate(-90deg);
    }

    .summary-progress-circle .circle-bg {
      fill: none;
      stroke: var(--surface-2);
      stroke-width: 3.8;
    }

    .summary-progress-circle .circle-fill {
      fill: none;
      stroke: var(--primary);
      stroke-width: 3.8;
      stroke-linecap: round;
      transition: stroke-dasharray var(--t-slow);
    }

    .circle-text {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      font-size: 0.85rem;
      font-weight: 800;
      color: var(--text);
    }

    .summary-divider {
      height: 1px;
      border-top: 1.5px dashed var(--border);
      margin: 14px 0;
    }

    .summary-list {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
    }

    .summary-list-item {
      display: flex;
      align-items: center;
      gap: 6px;
      background: var(--surface-2);
      border: 1px solid var(--border);
      border-radius: var(--r-md);
      padding: 6px 12px;
      font-size: 0.78rem;
      font-weight: 700;
      cursor: pointer;
      transition: all var(--t-fast);
      user-select: none;
    }

    .summary-list-item:hover {
      transform: translateY(-1px);
      box-shadow: var(--shadow-sm);
    }

    .summary-list-item.status-not-started {
      color: var(--muted);
      border-color: var(--border);
      background: var(--surface-2);
    }

    .summary-list-item.status-not-started:hover {
      background: var(--primary-light);
      border-color: var(--primary-dark);
      color: var(--primary-dark);
    }

    .summary-list-item.status-in-progress {
      background: var(--blue-bg);
      border-color: var(--blue);
      color: var(--blue);
    }

    .summary-list-item.status-completed {
      background: var(--green-bg);
      border-color: var(--green);
      color: var(--green);
    }

    .summary-list-item .item-icon {
      font-size: 0.85rem;
    }

    .summary-list-item .item-sets-ratio {
      font-size: 0.7rem;
      opacity: 0.8;
      margin-right: 4px;
    }

    /* ===================================
       SET CHECKBOX TRACKER
       =================================== */
    .set-tracker-container {
      margin-top: 14px;
      border-top: 1.5px dashed var(--border);
      padding-top: 14px;
    }

    .set-tracker-title {
      font-size: 0.85rem;
      font-weight: 800;
      color: var(--text-2);
      margin-bottom: 10px;
    }

    .set-row-list {
      display: flex;
      flex-direction: column;
      gap: 6px;
    }

    .set-check-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      background: var(--surface);
      border: 1.5px solid var(--border);
      border-radius: var(--r-md);
      padding: 8px 12px;
      cursor: pointer;
      transition: all var(--t-fast);
      user-select: none;
    }

    .set-check-row:hover {
      border-color: var(--border-2);
      background: var(--surface-2);
    }

    .set-check-row.checked {
      background: var(--green-bg);
      border-color: var(--green);
    }

    .set-check-num {
      font-size: 0.85rem;
      font-weight: 800;
      color: var(--text);
    }

    .set-check-row.checked .set-check-num {
      color: var(--green);
    }

    .set-check-reps {
      font-size: 0.78rem;
      font-weight: 600;
      color: var(--muted);
    }

    .set-check-box {
      width: 20px;
      height: 20px;
      border: 2px solid var(--border-2);
      border-radius: 6px;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: all var(--t-fast);
      background: var(--surface);
      color: transparent;
    }

    .set-check-row:hover .set-check-box {
      border-color: var(--primary);
    }

    .set-check-row.checked .set-check-box {
      background: var(--green);
      border-color: var(--green);
      color: white;
    }

    .set-check-box svg {
      width: 12px;
      height: 12px;
    }

    /* ===================================
       FLOATING TIMER WIDGET
       =================================== */
    .timer-float-widget {
      position: fixed;
      bottom: 24px;
      left: 50%;
      transform: translateX(-50%);
      width: 90%;
      max-width: 360px;
      background: rgba(255, 255, 255, 0.9);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      border: 1.5px solid var(--primary-light);
      border-radius: var(--r-xl);
      box-shadow: var(--shadow-xl);
      padding: 12px 16px;
      z-index: 1000;
      display: flex;
      flex-direction: column;
      gap: 10px;
      animation: floatWidgetIn 0.3s ease-out;
    }

    @keyframes floatWidgetIn {
      from { transform: translate(-50%, 20px); opacity: 0; }
      to { transform: translate(-50%, 0); opacity: 1; }
    }

    .timer-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .timer-title {
      font-size: 0.78rem;
      font-weight: 800;
      color: var(--text-2);
    }

    .timer-close-btn {
      background: transparent;
      border: none;
      color: var(--muted);
      cursor: pointer;
      font-size: 0.9rem;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 2px;
      border-radius: var(--r-sm);
      transition: all var(--t-fast);
    }

    .timer-close-btn:hover {
      background: var(--surface-2);
      color: var(--text);
    }

    .timer-body {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 16px;
    }

    .timer-ring-wrap {
      position: relative;
      width: 48px;
      height: 48px;
      flex-shrink: 0;
    }

    .timer-ring {
      width: 100%;
      height: 100%;
      transform: rotate(-90deg);
    }

    .timer-ring .timer-ring-bg {
      fill: none;
      stroke: var(--primary-light);
      stroke-width: 4;
    }

    .timer-ring .timer-ring-fill {
      fill: none;
      stroke: var(--primary);
      stroke-width: 4;
      stroke-linecap: round;
      transition: stroke-dasharray 1s linear;
    }

    .timer-text {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      font-size: 1.05rem;
      font-weight: 900;
      color: var(--primary);
      display: flex;
      align-items: baseline;
    }

    .timer-text span {
      font-size: 0.6rem;
      font-weight: 700;
      margin-left: 1px;
    }

    .timer-actions {
      display: flex;
      gap: 8px;
    }

    .timer-btn {
      font-family: 'Cairo', sans-serif;
      font-size: 0.78rem;
      font-weight: 700;
      border: 1.5px solid var(--border);
      border-radius: var(--r-md);
      padding: 6px 12px;
      cursor: pointer;
      transition: all var(--t-fast);
    }

    .timer-btn-plus {
      background: var(--surface);
      color: var(--text-2);
    }

    .timer-btn-plus:hover {
      background: var(--surface-2);
      border-color: var(--border-2);
    }

    .timer-btn-skip {
      background: var(--primary);
      color: white;
      border-color: var(--primary);
    }

    .timer-btn-skip:hover {
      background: var(--primary-dark);
      border-color: var(--primary-dark);
    }

    /* Highlight scroll effect */
    @keyframes flashHighlight {
      0% {
        box-shadow: 0 0 0 3px var(--primary-glow);
        border-color: var(--primary);
      }
      50% {
        box-shadow: 0 0 0 6px var(--primary-glow);
        border-color: var(--primary-dark);
      }
      100% {
        box-shadow: none;
        border-color: var(--border);
      }
    }

    .flash-highlight {
      animation: flashHighlight 1.2s ease-out;
    }

    /* ===================================
       PREFERS REDUCED MOTION
    =================================== */
    @media (prefers-reduced-motion: reduce) {
      *, *::before, *::after {
        animation-duration: 0.01ms !important;
        transition-duration: 0.01ms !important;
      }
    }
  </style>
</head>

      const targetIdx = dayIndices[dayName];
      if (targetIdx === undefined) return "";
      
      const now = new Date();
      const currentIdx = now.getDay(); // 0-6
      let diff = targetIdx - currentIdx;
      
      const targetDate = new Date(now);
      targetDate.setDate(now.getDate() + diff);
      
      const y = targetDate.getFullYear();
      const m = String(targetDate.getMonth() + 1).padStart(2, '0');
      const d = String(targetDate.getDate()).padStart(2, '0');
      return `${y}-${m}-${d}`;
    }

    // Progress calculator helper
    function getDailyProgress(exercises, dateKey) {
      const progress = workoutProgress[dateKey] || {};
      let totalSets = 0;
      let completedSets = 0;
      let completedExercises = 0;
      let inProgressExercises = 0;
      
      const exerciseStatuses = exercises.map(ex => {
        const sets = ex.sets;
        totalSets += sets;
        
        const setStatus = progress[ex.name] || Array(sets).fill(false);
        const doneCount = setStatus.filter(Boolean).length;
        completedSets += doneCount;
        
        let status = "not_started"; // not_started, in_progress, completed
        if (doneCount === sets) {
          status = "completed";
          completedExercises++;
        } else if (doneCount > 0) {
          status = "in_progress";
          inProgressExercises++;
        }
        
        return {
          name: ex.name,
          doneCount,
          totalSets: sets,
          status
        };
      });
      
      return {
        totalSets,
        completedSets,
        completedExercises,
        totalExercises: exercises.length,
        exerciseStatuses
      };
    }

    // --- REST TIMER STATE ---
    let timerInterval = null;
    let timerState = {
      active: false,
      duration: 0,
      remaining: 0,
      exName: "",
      setNum: 1
    };

    function parseRestSeconds(restStr) {
      if (!restStr) return 60;
      const num = parseFloat(restStr);
      if (isNaN(num)) return 60;
      if (restStr.includes("د")) {
        return Math.round(num * 60);
      }
      return Math.round(num);
    }

    window.startRestTimer = function(restStr, exName, setNum) {
      const seconds = parseRestSeconds(restStr);
      timerState.duration = seconds;
      timerState.remaining = seconds;
      timerState.exName = exName;
      timerState.setNum = setNum;
      timerState.active = true;
      
      clearInterval(timerInterval);
      renderApp();
      
      timerInterval = setInterval(() => {
        timerState.remaining--;
        if (timerState.remaining <= 0) {
          clearInterval(timerInterval);
          timerState.active = false;
          playTimerEndNotification();
        }
        renderApp();
      }, 1000);
    };

    window.stopRestTimer = function() {
      clearInterval(timerInterval);
      timerState.active = false;
      renderApp();
    };

    window.adjustRestTimer = function(amount) {
      timerState.remaining = Math.max(0, timerState.remaining + amount);
      timerState.duration = Math.max(timerState.duration, timerState.remaining);
      renderApp();
    };

    window.skipRestTimer = function() {
      stopRestTimer();
    };

    function playTimerEndNotification() {
      try {
        const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        const playNote = (freq, delay, duration) => {
          const osc = audioCtx.createOscillator();
          const gain = audioCtx.createGain();
          osc.type = 'sine';
          osc.frequency.setValueAtTime(freq, audioCtx.currentTime + delay);
          
          gain.gain.setValueAtTime(0.15, audioCtx.currentTime + delay);
          gain.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + delay + duration);
          
          osc.connect(gain);
          gain.connect(audioCtx.destination);
          osc.start(audioCtx.currentTime + delay);
          osc.stop(audioCtx.currentTime + delay + duration);
        };
        playNote(523.25, 0, 0.2); // C5
        playNote(659.25, 0.15, 0.35); // E5
      } catch (e) {}
      
      if (navigator.vibrate) {
        navigator.vibrate([100, 50, 100]);
      }
    }

    window.openAndScrollToExercise = function(exName) {
      openExercises[exName] = true;

        const el = document.getElementById(`ex-card-${cleanId}`);
        if (el) {

    window.toggleSet = function(exName, setIdx, maxSets, restStr) {
      const dateKey = getDateOfDayName(activeDay);
      if (!workoutProgress[dateKey]) {
        workoutProgress[dateKey] = {};
      }
      if (!workoutProgress[dateKey][exName]) {
        workoutProgress[dateKey][exName] = Array(maxSets).fill(false);
      }
      
      const currentVal = !workoutProgress[dateKey][exName][setIdx];
      workoutProgress[dateKey][exName][setIdx] = currentVal;
      saveProgress();
      
      if (currentVal) {
        startRestTimer(restStr, exName, setIdx + 1);
      }
      
      renderApp();
    };

    let mealsState = {};
    try {
      const saved = localStorage.getItem("fitness_tracker_meals_v2");
      if (saved) {
        const parsed = JSON.parse(saved);
        if (parsed && typeof parsed === "object") mealsState = parsed;
      }
    } catch(e) {}

      if (!mealsState[d]) {

    function saveMeals() {
      try { localStorage.setItem("fitness_tracker_meals_v2", JSON.stringify(mealsState)); } catch(e) {}
    }

    function calcItem(item) {
      return {
        cal: Math.round((item.per100g.cal * item.grams) / 100),
        p: Math.round((item.per100g.p * item.grams) / 100 * 10) / 10,
        c: Math.round((item.per100g.c * item.grams) / 100 * 10) / 10,
        f: Math.round((item.per100g.f * item.grams) / 100 * 10) / 10,
      };
    }

    function calcMeal(items) {
      return items.reduce((a, i) => {
        const n = calcItem(i);
        return { cal: a.cal + n.cal, p: a.p + n.p, c: a.c + n.c, f: a.f + n.f };
      }, { cal: 0, p: 0, c: 0, f: 0 });
    }

    function pct(v, t) { return Math.min(100, Math.round((v / t) * 100)); }

    function getVideoEmbedUrl(url) {
      if (!url) return '';
      return url.replace(/[?&]autoplay=1/g, '').replace(/[?&]mute=1/g, '').replace(/\?&/, '?').replace(/&&/g, '&').replace(/\?$/, '');
    }

    function foodSearchText(item) {
      return [item.name, ...(item.keywords || [])].join(' ').toLowerCase();

    function findLocalFoods(query) {
      const searchTerms = query.toLowerCase().split(/\s+/).filter(Boolean);
      const results = [];
      Object.entries(EGYPTIAN_FOODS).forEach(([cat, list]) => {
        list.forEach(item => {
          const text = foodSearchText(item);
          if (searchTerms.every(term => text.includes(term))) {
            results.push({
              name: item.name,
              icon: item.icon || '🍲',
              cal: item.per100g.cal,
              p: item.per100g.p,
              c: item.per100g.c,
              f: item.per100g.f,
              isLocal: true
            });
          }
        });
      });
      return results;
    }

                        />
                        <span class="gram-unit">غ</span>
                      </div>
                      <div style="display:flex;gap:4px;flex-shrink:0">
                        ${canSwap ? `
                          <button class="swap-btn" onclick="openFoodModal('${mealKey}', 'swap', ${idx})" aria-label="تغيير ${item.name}" title="استبدال">
                            ⇄
                          </button>
                        ` : ""}
                        <button class="swap-btn" style="color:#ef4444;border-color:#fca5a5" onclick="deleteFood('${mealKey}', ${idx})" aria-label="حذف ${item.name}" title="حذف">
                          <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polyline points="3 6 5 6 21 6"/><path d="M19 6l-1 14a2 2 0 0 1-2 2H8a2 2 0 0 1-2-2L5 6"/><path d="M10 11v6M14 11v6"/></svg>
                        </button>
                      </div>
                    </div>
                  `;
                }).join("")}
                <div class="meal-summary-row">
                  <span class="meal-summary-item">المجموع: <span style="color:#6366f1">${mealTotals.cal} kcal</span></span>
                  <span class="meal-summary-item">بروتين: <span style="color:#3b82f6">${Math.round(mealTotals.p)}غ</span></span>
                  <span class="meal-summary-item">كارب: <span style="color:#10b981">${Math.round(mealTotals.c)}غ</span></span>
                  <span class="meal-summary-item">دهون: <span style="color:#8b5cf6">${Math.round(mealTotals.f)}غ</span></span>
                </div>
                <div style="padding:8px 16px">
                  <button
                    class="add-food-btn"
                    onclick="openFoodModal('${mealKey}', 'add')"
                    aria-label="إضافة أكل لوجبة ${meal.label}"
                  >
                    <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" aria-hidden="true"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
                    إضافة أكل
                  </button>
                </div>
              </div>
            `;
          }

          html += `
            <div class="meal-card ${isOpen ? 'open' : ''}" role="listitem">
              <div
                class="meal-header"
                onclick="toggleMeal('${mealKey}')"
                aria-expanded="${isOpen}"
                role="button"
                tabindex="0"
                aria-label="${meal.label}"
              >
                <div class="meal-header-left">
                  <div class="meal-icon ${meal.mealClass}" aria-hidden="true">${meal.icon}</div>
                  <div>
                    <div class="meal-name">${meal.label}</div>
                    <div class="meal-cal-preview">${items.length} عنصر</div>
                  </div>
                </div>
                <div class="meal-header-right">
                  <span class="meal-total-badge">${mealTotals.cal} kcal</span>
                  <span class="meal-chevron" aria-hidden="true">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
                      <polyline points="6 9 12 15 18 9"/>
                    </svg>
                  </span>
                </div>
              </div>
              ${bodyHtml}
            </div>
          `;
        });

        html += `</div>`;
      }

      // ─────────────────────────────────────────────────
      // FOOD MODAL
      // ─────────────────────────────────────────────────
      if (foodModal) {
        const fm = foodModal;
        const mKey = fm.mealKey;
        const mLabel = BASE_MEALS[mKey] ? BASE_MEALS[mKey].label : '';

        // Build category tabs for 'add' mode
        const cats = [
          { key:'protein', label:'بروتين' },
          { key:'carb',    label:'كارب' },
          { key:'street',  label:'أكل شارع' },
          { key:'veg',     label:'خضار' },
          { key:'fat',     label:'دهون' },
          { key:'fruit',   label:'فاكهة' },
        ];
        const activeCat = fm.activeCat || 'protein';

        let modalBody = '';

        // ─── mode: swap (like before but richer) ───
        if (fm.mode === 'swap') {
          const item = mealsState[activeDay][mKey][fm.idx];
          const catFoods = EGYPTIAN_FOODS[item.category] || [];
          const opts = catFoods.length > 0 ? catFoods : Object.values(EGYPTIAN_FOODS).flat();
          modalBody = `
            <div class="modal-title">استبدال "${item.name}"</div>
            <div class="modal-subtitle">اختار البديل — الأكل المصري المتاح</div>
            <div class="modal-divider"></div>
            <div style="display:flex;flex-direction:column;gap:6px">
              ${opts.map(o => `
                <button class="option-btn" onclick="doSwapFood('${mKey}', ${fm.idx}, '${o.name.replace(/'/g,"\\'")}')"
                  title="${o.per100g.cal} kcal لكل 100غ">
                  <div class="option-icon">${o.icon}</div>
                  <div class="option-info">
                    <div class="option-name">${o.name}</div>
                    <div class="option-macros">${o.per100g.cal} kcal | بروتين ${o.per100g.p}غ | كارب ${o.per100g.c}غ | دهون ${o.per100g.f}غ</div>
                  </div>
                </button>
              `).join('')}
            </div>
          `;
        }

        // ─── mode: add (Egyptian DB by category) ───
        else if (fm.mode === 'add') {
          const foods = EGYPTIAN_FOODS[activeCat] || [];
          const allCustom = customFoodDB;
          modalBody = `
            <div class="modal-title">إضافة أكل لـ ${mLabel}</div>
            <div class="modal-subtitle">اختار من قاعدة بيانات الأكل المصري</div>
            <div class="food-modal-tabs">
              ${cats.map(c => `
                <button class="food-modal-tab ${activeCat===c.key?'active':''}" onclick="setFoodModalCat('${c.key}')">${c.label}</button>
              `).join('')}
              <button class="food-modal-tab ${activeCat==='custom'?'active':''}" onclick="setFoodModalCat('custom')">⭐ مخصص</button>
              <button class="food-modal-tab ${activeCat==='search'?'active':''}" onclick="setFoodModalCat('search')">🔍 بحث</button>
            </div>
            <div class="modal-divider"></div>

            ${activeCat === 'search' ? `
              <div class="search-box-wrap">
                <input
                  class="search-box-input"
                  type="text"
                  placeholder="ابحث بالاسم (عربي أو انجليزي)..."
                  value="${fm.searchQuery || ''}"
                  oninput="handleFoodSearch(this.value)"
                  id="foodSearchInput"
                  aria-label="بحث عن أكل"
                />
                <div id="searchLoading" class="search-loading" style="display: ${fm.searching ? 'block' : 'none'}">جاري البحث...</div>
              </div>
              <div id="searchResultsContainer">
                ${renderSearchResultsHtml(fm.searchResults, fm.searchQuery, fm.searching, mKey)}
              </div>
            ` : activeCat === 'custom' ? `
              <div class="custom-food-form">
                <div class="form-title">أضف أكل مخصص بالماكرو</div>
                <input class="form-input" type="text" placeholder="اسم الأكل *" id="cf_name" oninput="updateCustomForm()" aria-label="اسم الأكل"/>
                <div class="form-row">
                  <div class="form-group">
                    <label class="form-label">سعرات (لكل 100غ) *</label>
                    <input class="form-input" type="number" min="0" placeholder="مثال: 150" id="cf_cal" oninput="updateCustomForm()" aria-label="السعرات الحرارية"/>
                  </div>
                  <div class="form-group">
                    <label class="form-label">بروتين (غ)</label>
                    <input class="form-input" type="number" min="0" step="0.1" placeholder="0" id="cf_p" oninput="updateCustomForm()" aria-label="البروتين"/>
                  </div>
                </div>
                <div class="form-row">
                  <div class="form-group">
                    <label class="form-label">كارب (غ)</label>
                    <input class="form-input" type="number" min="0" step="0.1" placeholder="0" id="cf_c" oninput="updateCustomForm()" aria-label="الكارب"/>
                  </div>
                  <div class="form-group">
                    <label class="form-label">دهون (غ)</label>
                    <input class="form-input" type="number" min="0" step="0.1" placeholder="0" id="cf_f" oninput="updateCustomForm()" aria-label="الدهون"/>
                  </div>
                </div>
                <div class="form-group">
                  <label class="form-label">الكمية بالجرام *</label>
                  <input class="form-input" type="number" min="1" placeholder="مثال: 200" id="cf_grams" oninput="updateCustomForm()" aria-label="الكمية بالجرام"/>
                </div>
                <button class="add-confirm-btn" id="cf_submit" onclick="addCustomFood('${mKey}')" disabled>إضافة للوجبة</button>
                ${allCustom.length > 0 ? `
                  <div style="margin-top:14px">
                    <div style="font-size:0.78rem;font-weight:700;color:#64748b;margin-bottom:8px">أكلك المحفوظ مسبقاً:</div>
                    ${allCustom.map((cf,i) => `
                      <button class="option-btn" onclick="addSavedCustomFood('${mKey}', ${i})" style="margin-bottom:5px">
                        <div class="option-icon">⭐</div>
                        <div class="option-info">
                          <div class="option-name">${cf.name}</div>
                          <div class="option-macros">${cf.cal} kcal | بروتين ${cf.p}غ | كارب ${cf.c}غ | دهون ${cf.f}غ — لكل 100غ</div>
                        </div>
                      </button>
                    `).join('')}
                  </div>
                ` : ''}
              </div>
            ` : `
              <div style="display:flex;flex-direction:column;gap:6px">
                ${foods.map(o => `
                  <button class="option-btn" onclick="addEgyptianFood('${mKey}', '${o.name.replace(/'/g,"\\'")}')"
                    title="${o.per100g.cal} kcal لكل 100غ">
                    <div class="option-icon">${o.icon}</div>
                    <div class="option-info">
                      <div class="option-name">${o.name}</div>
                      <div class="option-macros">${o.per100g.cal} kcal | بروتين ${o.per100g.p}غ | كارب ${o.per100g.c}غ | دهون ${o.per100g.f}غ — لكل 100غ</div>
                    </div>
                  </button>
                `).join('')}
              </div>
            `}
          `;
        }

        html += `
          <div class="modal-overlay" onclick="closeFoodModal()" role="dialog" aria-modal="true" aria-label="إدارة الأكل">
            <div class="modal" onclick="event.stopPropagation()" style="padding-bottom:env(safe-area-inset-bottom,16px)">
              <div class="modal-handle" aria-hidden="true"></div>
              ${modalBody}
              <button class="close-btn" onclick="closeFoodModal()" style="margin-top:12px">
                <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" aria-hidden="true"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
                إغلاق
              </button>
            </div>
          </div>
        `;

        // Auto-focus search input after render
        if (fm.mode === 'add' && (fm.activeCat === 'search')) {
          setTimeout(() => {
            const inp = document.getElementById('foodSearchInput');
            if (inp) inp.focus();
          }, 50);
        }
      }

      // Legacy swap modal (fallback)
      if (swapTarget && !foodModal) {
        const item = swapTarget.item;
        const options = item.category === "carb" ? CARB_OPTIONS : item.category === "protein" ? PROTEIN_OPTIONS : null;
        if (options) {
          html += `
            <div class="modal-overlay" onclick="closeSwapModal()" role="dialog" aria-modal="true" aria-label="استبدال ${item.name}">
              <div class="modal" onclick="event.stopPropagation()">
                <div class="modal-handle" aria-hidden="true"></div>
                <div class="modal-title">استبدال "${item.name}"</div>
                <div class="modal-subtitle">اختار البديل المناسب</div>
                <div class="modal-divider"></div>
                ${options.map(o => `
                  <button class="option-btn" onclick="handleSwap('${swapTarget.mealKey}', ${swapTarget.idx}, '${o.name}')">
                    <div class="option-icon" aria-hidden="true">${o.icon}</div>
                    <div class="option-info">
                      <div class="option-name">${o.name}</div>
                      <div class="option-macros">${o.per100g.cal} kcal | بروتين ${o.per100g.p}غ | كارب ${o.per100g.c}غ | دهون ${o.per100g.f}غ — لكل 100غ</div>
                    </div>
                  </button>
                `).join("")}
                <button class="close-btn" onclick="closeSwapModal()">
                  <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" aria-hidden="true"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
                  إلغاء
                </button>
              </div>
            </div>
          `;
        }
      }

      // Render Floating Rest Timer Widget
      if (timerState.active) {
        const percent = Math.round((timerState.remaining / timerState.duration) * 100);
        html += `
          <div class="timer-float-widget fade-in" role="dialog" aria-label="مؤقت الراحة">
            <div class="timer-header">
              <span class="timer-title">وقت الراحة: ${timerState.exName} (سيت ${timerState.setNum})</span>
              <button class="timer-close-btn" onclick="stopRestTimer()" aria-label="إغلاق المؤقت">✕</button>
            </div>
            <div class="timer-body">
              <div class="timer-ring-wrap">
                <svg class="timer-ring" viewBox="0 0 36 36">
                  <path class="timer-ring-bg" d="M18 2.0845 a 15.9155 15.9155 0 0 1 0 31.831 a 15.9155 15.9155 0 0 1 0 -31.831" />
                  <path class="timer-ring-fill" stroke-dasharray="${percent}, 100" d="M18 2.0845 a 15.9155 15.9155 0 0 1 0 31.831 a 15.9155 15.9155 0 0 1 0 -31.831" />
                </svg>
                <div class="timer-text">${timerState.remaining}<span>ث</span></div>
              </div>
              <div class="timer-actions">
                <button class="timer-btn timer-btn-plus" onclick="adjustRestTimer(10)">+10ث</button>
                <button class="timer-btn timer-btn-skip" onclick="skipRestTimer()">تخطي ➔</button>
              </div>
            </div>
          </div>
        `;
      }

      root.innerHTML = html;
    }

    // ============================================================
    // STATE ACTIONS
    // ============================================================
    window.setActiveDay = function(day) { activeDay = day; renderApp(); };
    window.setTab = function(tab) { currentTab = tab; renderApp(); };
    window.toggleExercise = function(exName) { openExercises[exName] = !openExercises[exName]; renderApp(); };
    window.playExerciseVideo = function(exName) { videoPlaying[exName] = true; renderApp(); };
    window.toggleMeal = function(mealKey) { openMeals[mealKey] = !openMeals[mealKey]; renderApp(); };

    // ─── Food Modal ───────────────────────────────────────
    window.openFoodModal = function(mealKey, mode, idx) {
      foodModal = { mealKey, mode, idx: idx !== undefined ? idx : null, activeCat: 'protein', searchQuery: '', searchResults: [], searching: false };
      renderApp();
    };
    window.closeFoodModal = function() { foodModal = null; renderApp(); };
    window.setFoodModalCat = function(cat) {
      if (foodModal) { foodModal.activeCat = cat; renderApp(); }
    };

    // ─── Add Egyptian food to meal ─────────────────────────
    window.addEgyptianFood = function(mealKey, foodName) {
      const allFoods = Object.values(EGYPTIAN_FOODS).flat();
      const food = allFoods.find(f => f.name === foodName);
      if (!food) return;
      mealsState[activeDay][mealKey].push({
        id: 'custom_' + Date.now(),
        name: food.name,
        category: 'custom',
        grams: 100,
        per100g: { ...food.per100g }
      });
      saveMeals();
      foodModal = null;
      renderApp();
    };

    // ─── Swap food using Egyptian DB ──────────────────────
    window.doSwapFood = function(mealKey, idx, foodName) {
      const allFoods = Object.values(EGYPTIAN_FOODS).flat();
      const food = allFoods.find(f => f.name === foodName);
      if (!food) return;
      const item = mealsState[activeDay][mealKey][idx];
      item.name = food.name;
      item.per100g = { ...food.per100g };
      saveMeals();
      foodModal = null;
      renderApp();
    };

    // ─── Delete food from meal ─────────────────────────────
    window.deleteFood = function(mealKey, idx) {
      mealsState[activeDay][mealKey].splice(idx, 1);
      saveMeals();
      renderApp();
    };

    // ─── Custom food form (manual entry) ──────────────────
    window.updateCustomForm = function() {
      const name  = (document.getElementById('cf_name')  || {}).value || '';
      const cal   = (document.getElementById('cf_cal')   || {}).value || '';
      const grams = (document.getElementById('cf_grams') || {}).value || '';
      const btn   = document.getElementById('cf_submit');
      if (btn) btn.disabled = !(name.trim() && cal && grams);
    };

    window.addCustomFood = function(mealKey) {
      const name  = (document.getElementById('cf_name')  || {}).value || '';
      const cal   = parseFloat((document.getElementById('cf_cal')   || {}).value) || 0;
      const p     = parseFloat((document.getElementById('cf_p')     || {}).value) || 0;
      const c     = parseFloat((document.getElementById('cf_c')     || {}).value) || 0;
      const f     = parseFloat((document.getElementById('cf_f')     || {}).value) || 0;
      const grams = parseFloat((document.getElementById('cf_grams') || {}).value) || 100;
      if (!name.trim() || !cal) return;
      const per100g = { cal, p, c, f };
      // Save to custom DB if not already there
      if (!customFoodDB.find(x => x.name === name)) {
        customFoodDB.push({ name, cal, p, c, f });
        saveCustomFoods();
      }
      mealsState[activeDay][mealKey].push({
        id: 'custom_' + Date.now(),
        name: name.trim(),
        category: 'custom',
        grams,
        per100g
      });
      saveMeals();
      foodModal = null;
      renderApp();
    };

    window.addSavedCustomFood = function(mealKey, cfIdx) {
      const cf = customFoodDB[cfIdx];
      if (!cf) return;
      mealsState[activeDay][mealKey].push({
        id: 'custom_' + Date.now(),
        name: cf.name,
        category: 'custom',
        grams: 100,
        per100g: { cal: cf.cal, p: cf.p, c: cf.c, f: cf.f }
      });
      saveMeals();
      foodModal = null;
      renderApp();
    };

    // ─── Open Food Facts Search ────────────────────────────
    let searchTimer = null;
    window.handleFoodSearch = function(query) {
      if (!foodModal) return;
      foodModal.searchQuery = query;
      foodModal.searching = false;
      foodModal.searchResults = [];
      
      const loadingEl = document.getElementById('searchLoading');
      const containerEl = document.getElementById('searchResultsContainer');
      
      clearTimeout(searchTimer);
      if (!query || query.trim().length < 2) {
        if (loadingEl) loadingEl.style.display = 'none';
        if (containerEl) containerEl.innerHTML = '';
        return;
      }
      
      foodModal.searching = true;
      if (loadingEl) loadingEl.style.display = 'block';
      if (containerEl) containerEl.innerHTML = '';
      
      searchTimer = setTimeout(() => doFoodSearch(query.trim()), 600);
    };

    async function doFoodSearch(query) {
      if (!foodModal) return;
      
      // 1. Search local EGYPTIAN_FOODS database first
      const localResults = findLocalFoods(query);
      
      let onlineResults = [];
      try {
        const apiQuery = query;
        const url = `https://world.openfoodfacts.org/cgi/search.pl?search_terms=${encodeURIComponent(apiQuery)}&search_simple=1&action=process&json=1&page_size=10&lc=ar&countries_tags_en=Egypt`;
        const res = await fetch(url);
        const data = await res.json();
        onlineResults = (data.products || []).filter(p =>
          p.product_name && p.nutriments
        ).slice(0, 8).map(p => ({
          name: p.product_name_ar || p.product_name || p.abbreviated_product_name || query,
          icon: '🔎',
          cal: Math.round(p.nutriments['energy-kcal_100g'] || p.nutriments['energy-kcal'] || 0),
          p:   Math.round((p.nutriments['proteins_100g']     || 0) * 10) / 10,
          c:   Math.round((p.nutriments['carbohydrates_100g']|| 0) * 10) / 10,
          f:   Math.round((p.nutriments['fat_100g']          || 0) * 10) / 10,
          isLocal: false
        })).filter(r => r.cal > 0);
      } catch(e) {}
      
      // Combine local and online results
      const combined = [...localResults];
      onlineResults.forEach(or => {
        if (!combined.some(cr => cr.name.toLowerCase() === or.name.toLowerCase())) {
          combined.push(or);
        }
      });
      
      if (foodModal && foodModal.searchQuery === query) {
        foodModal.searching = false;
        foodModal.searchResults = combined;
        
        const loadingEl = document.getElementById('searchLoading');
        const containerEl = document.getElementById('searchResultsContainer');
        if (loadingEl) loadingEl.style.display = 'none';
        if (containerEl) {
          containerEl.innerHTML = renderSearchResultsHtml(combined, query, false, foodModal.mealKey);
        }
      }
    }

    window.addSearchedFood = function(mealKey, resultIdx) {
      if (!foodModal || !foodModal.searchResults[resultIdx]) return;
      const r = foodModal.searchResults[resultIdx];
      mealsState[activeDay][mealKey].push({
        id: 'search_' + Date.now(),
        name: r.name,
        category: 'custom',
        grams: 100,
        per100g: { cal: r.cal, p: r.p, c: r.c, f: r.f }
      });
      saveMeals();
      foodModal = null;
      renderApp();
    };

    // ─── Legacy swap & gram handlers ──────────────────────
    window.openSwapModal = function(mealKey, idx) {
      swapTarget = { mealKey, idx, item: mealsState[activeDay][mealKey][idx] };
      renderApp();
    };
    window.closeSwapModal = function() { swapTarget = null; renderApp(); };
    window.handleGramChange = function(mealKey, idx, val) {
      mealsState[activeDay][mealKey][idx].grams = Math.max(0, parseInt(val) || 0);
      saveMeals();
      renderApp();
    };
    window.handleSwap = function(mealKey, idx, optName) {
      const item = mealsState[activeDay][mealKey][idx];
      const allFoods = Object.values(EGYPTIAN_FOODS).flat();
      const opt = allFoods.find(o => o.name === optName);
      if (opt) { item.name = opt.name; item.per100g = { ...opt.per100g }; saveMeals(); }
      swapTarget = null;
      renderApp();
    };

    // Keyboard accessibility for cards
    document.addEventListener('keydown', function(e) {
      if (e.key === 'Enter' && e.target.getAttribute('role') === 'button') {
        e.target.click();
      }
    });

    // Scroll progress bar
    window.addEventListener('scroll', function() {
      const scrollTop = window.scrollY;
      const docHeight = document.documentElement.scrollHeight - window.innerHeight;
      const progress = docHeight > 0 ? (scrollTop / docHeight) * 100 : 0;
      const bar = document.getElementById('scrollBar');
      if (bar) bar.style.width = progress + '%';
    });

    // Set today's date in topbar
    (function() {
      const now = new Date();
      const opts = { weekday: 'long', day: 'numeric', month: 'long' };
      const dateStr = now.toLocaleDateString('ar-EG', opts);
      const el = document.getElementById('todayDate');
      if (el) el.textContent = dateStr;
    })();

    // Initial render
    renderApp();
  </script>
</body>
</html>
