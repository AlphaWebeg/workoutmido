<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>💪 مدرّبك الشخصي</title>

  <!-- Font -->
  <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;900&display=swap" rel="stylesheet">

  <style>
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
    :root {
      --bg: #f8fafc;
      --surface: #ffffff;
      --card: #ffffff;
      --border: #f1f5f9;
      --border-dark: #e2e8f0;
      --accent: #4f46e5;
      --accent-gradient: linear-gradient(135deg, #6366f1, #3b82f6);
      --accent-light: rgba(99, 102, 241, 0.06);
      --accent2: #ec4899;
      --accent2-gradient: linear-gradient(135deg, #ec4899, #f43f5e);
      --green: #10b981;
      --green-light: rgba(16, 185, 129, 0.08);
      --blue: #3b82f6;
      --blue-light: rgba(59, 130, 246, 0.08);
      --text: #0f172a;
      --muted: #64748b;
      --radius: 16px;
      --shadow-sm: 0 1px 2px 0 rgba(0, 0, 0, 0.05);
      --shadow-md: 0 4px 20px -2px rgba(15, 23, 42, 0.04), 0 2px 6px -1px rgba(15, 23, 42, 0.02);
      --shadow-lg: 0 10px 30px -4px rgba(15, 23, 42, 0.06), 0 4px 12px -2px rgba(15, 23, 42, 0.03);
    }
    body {
      background: var(--bg);
      background-image: radial-gradient(at 0% 0%, rgba(99, 102, 241, 0.03) 0px, transparent 50%),
                        radial-gradient(at 100% 100%, rgba(236, 72, 153, 0.03) 0px, transparent 50%);
      color: var(--text);
      font-family: 'Cairo', sans-serif;
      direction: rtl;
      min-height: 100vh;
    }
    .app {
      max-width: 900px;
      margin: 0 auto;
      padding: 24px 16px;
    }

    /* Header */
    .header {
      text-align: center;
      padding: 36px 0 24px;
      margin-bottom: 24px;
      position: relative;
    }
    .header h1 {
      font-size: 2.2rem;
      font-weight: 900;
      background: linear-gradient(135deg, var(--accent), var(--accent2));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      margin-bottom: 8px;
      letter-spacing: -0.5px;
    }
    .header p {
      color: var(--muted);
      font-size: 0.95rem;
      font-weight: 500;
    }
    .header::before {
      content: '';
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      width: 160px;
      height: 160px;
      background: var(--accent);
      filter: blur(80px);
      opacity: 0.08;
      z-index: -1;
      border-radius: 50%;
    }

    /* Day Tabs */
    .day-tabs {
      display: flex;
      gap: 8px;
      overflow-x: auto;
      padding: 4px 2px 12px;
      margin-bottom: 24px;
      scrollbar-width: none;
      -webkit-overflow-scrolling: touch;
    }
    .day-tabs::-webkit-scrollbar {
      display: none;
    }
    .day-tab {
      flex: 0 0 auto;
      padding: 10px 20px;
      border-radius: 100px;
      border: 1px solid var(--border-dark);
      background: var(--surface);
      color: var(--muted);
      cursor: pointer;
      font-family: 'Cairo', sans-serif;
      font-size: 0.88rem;
      font-weight: 600;
      transition: all 0.25s cubic-bezier(0.4, 0, 0.2, 1);
      box-shadow: var(--shadow-sm);
      white-space: nowrap;
    }
    .day-tab:hover {
      border-color: var(--accent);
      color: var(--accent);
      transform: translateY(-1px);
    }
    .day-tab.active {
      background: var(--accent-gradient);
      border-color: transparent;
      color: #ffffff;
      font-weight: 700;
      box-shadow: 0 4px 12px rgba(99, 102, 241, 0.25);
    }
    .day-tab.rest.active {
      background: var(--muted);
      color: #ffffff;
      box-shadow: none;
    }

    /* Tab Switcher - Segmented Control */
    .tab-row {
      display: flex;
      background: #f1f5f9;
      padding: 4px;
      border-radius: 12px;
      margin-bottom: 24px;
      border: 1px solid #e2e8f0;
    }
    .tab-btn {
      flex: 1;
      padding: 10px;
      border-radius: 8px;
      border: none;
      background: transparent;
      color: var(--muted);
      font-family: 'Cairo', sans-serif;
      font-size: 0.9rem;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.2s;
      text-align: center;
      user-select: none;
    }
    .tab-btn.active {
      background: var(--surface);
      color: var(--accent);
      box-shadow: var(--shadow-sm);
      font-weight: 700;
    }

    .section-title {
      font-size: 1.1rem;
      font-weight: 800;
      color: var(--text);
      margin-bottom: 16px;
      display: flex;
      align-items: center;
      gap: 8px;
    }

    /* Workout Header */
    .workout-header {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 20px;
      margin-bottom: 20px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      box-shadow: var(--shadow-md);
    }

    .workout-badge {
      display: inline-block;
      padding: 6px 14px;
      border-radius: 100px;
      font-size: 0.8rem;
      font-weight: 700;
    }
    .badge-upper {
      background: var(--blue-light);
      color: var(--blue);
      border: 1px solid rgba(59, 130, 246, 0.15);
    }
    .badge-lower {
      background: var(--green-light);
      color: var(--green);
      border: 1px solid rgba(16, 185, 129, 0.15);
    }
    .badge-rest {
      background: #f1f5f9;
      color: var(--muted);
      border: 1px solid var(--border-dark);
    }

    /* Exercise list & card */
    .ex-list {
      display: flex;
      flex-direction: column;
      gap: 12px;
      margin-bottom: 24px;
    }
    .ex-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      overflow: hidden;
      transition: all 0.25s cubic-bezier(0.4, 0, 0.2, 1);
      box-shadow: var(--shadow-md);
    }
    .ex-card:hover {
      transform: translateY(-1px);
      box-shadow: var(--shadow-lg);
      border-color: var(--border-dark);
    }
    .ex-card.open {
      border-color: var(--accent);
      box-shadow: var(--shadow-lg);
    }
    .ex-header {
      display: flex;
      align-items: center;
      gap: 16px;
      padding: 16px 20px;
      cursor: pointer;
      user-select: none;
    }
    .ex-num {
      width: 32px;
      height: 32px;
      border-radius: 50%;
      background: var(--accent-light);
      color: var(--accent);
      font-weight: 800;
      font-size: 0.9rem;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
    }
    .ex-info {
      flex: 1;
    }
    .ex-name {
      font-weight: 800;
      font-size: 0.95rem;
      color: var(--text);
      margin-bottom: 4px;
    }
    .ex-meta {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
    }
    .muscle-tag {
      display: inline-block;
      padding: 2px 10px;
      border-radius: 100px;
      font-size: 0.75rem;
      font-weight: 600;
      background: var(--accent-light);
      color: var(--accent);
      border: 1px solid rgba(99, 102, 241, 0.12);
    }
    .tool-tag {
      font-size: 0.75rem;
      font-weight: 500;
      color: var(--muted);
      background: #f1f5f9;
      padding: 2px 10px;
      border-radius: 100px;
      border: 1px solid #e2e8f0;
    }
    .ex-stats {
      display: flex;
      gap: 8px;
      flex-shrink: 0;
    }
    .stat-pill {
      background: #f8fafc;
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 6px 12px;
      text-align: center;
      font-size: 0.75rem;
      line-height: 1.3;
      transition: all 0.2s;
    }
    .stat-pill strong {
      display: block;
      font-size: 0.9rem;
      color: var(--text);
      font-weight: 750;
    }
    .stat-pill span {
      color: var(--muted);
    }
    .ex-expand-btn {
      background: var(--surface);
      border: 1px solid var(--border-dark);
      color: var(--muted);
      cursor: pointer;
      font-size: 0.8rem;
      font-weight: 600;
      padding: 6px 14px;
      border-radius: 8px;
      white-space: nowrap;
      font-family: 'Cairo', sans-serif;
      transition: all 0.2s;
      flex-shrink: 0;
    }
    .ex-expand-btn:hover, .ex-expand-btn.active {
      border-color: var(--accent);
      color: var(--accent);
    }
    .ex-expand-btn.active {
      background: var(--accent-light);
    }

    /* Media Tab View */
    .ex-media {
      border-top: 1px solid var(--border);
      background: #f8fafc;
      padding: 20px;
    }
    .media-tabs {
      display: flex;
      background: #e2e8f0;
      padding: 3px;
      border-radius: 10px;
      margin-bottom: 16px;
      gap: 2px;
    }
    .media-tab {
      flex: 1;
      padding: 8px;
      background: transparent;
      border: none;
      color: var(--muted);
      font-family: 'Cairo', sans-serif;
      font-size: 0.82rem;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.2s;
      border-radius: 8px;
      text-align: center;
    }
    .media-tab.active {
      background: var(--surface);
      color: var(--accent);
      box-shadow: var(--shadow-sm);
    }
    .gif-wrap {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 12px;
      overflow: hidden;
      box-shadow: var(--shadow-sm);
      text-align: center;
      padding: 12px;
      margin-bottom: 12px;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 240px;
    }
    .gif-wrap img {
      max-height: 280px;
      object-fit: contain;
      border-radius: 8px;
    }
    .video-wrap {
      position: relative;
      padding-bottom: 56.25%;
      height: 0;
      overflow: hidden;
      border-radius: 12px;
      box-shadow: var(--shadow-sm);
      margin-bottom: 12px;
      border: 1px solid var(--border);
      background: #000;
    }
    .video-wrap iframe {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      border: none;
    }
    .ex-details {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 10px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 12px;
      margin-top: 12px;
    }
    .ex-details span {
      font-size: 0.82rem;
      font-weight: 600;
      color: var(--text);
      display: flex;
      align-items: center;
      gap: 6px;
    }

    /* CSS Animations for Placeholder/Fallback */
    @keyframes ex-bounce{0%,100%{transform:translateY(0)}50%{transform:translateY(-14px)}}
    @keyframes ex-squat{0%,100%{transform:scaleY(1) translateY(0)}50%{transform:scaleY(.82) translateY(10px)}}
    @keyframes ex-hinge{0%,100%{transform:rotate(0deg)}50%{transform:rotate(30deg)}}
    @keyframes ex-curl{0%,100%{transform:rotate(-35deg)}50%{transform:rotate(35deg)}}
    @keyframes ex-pulse{0%,100%{transform:scale(1)}50%{transform:scale(1.08)}}
    @keyframes ex-swing{0%,100%{transform:rotate(-20deg)}50%{transform:rotate(20deg)}}
    
    .ex-anim-card {
      display: flex;
      gap: 20px;
      padding: 20px;
      background: var(--surface);
      border-radius: 12px;
      border: 1px solid var(--border);
      box-shadow: var(--shadow-sm);
    }
    .anim-icon-area {
      width: 100px;
      flex-shrink: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      background: #f8fafc;
      border-radius: 12px;
      padding: 16px 8px;
      border: 1px solid var(--border);
    }
    .anim-icon {
      font-size: 3.2rem;
      line-height: 1;
      display: block;
      transform-origin: bottom center;
    }
    .anim-type-lbl {
      font-size: 0.7rem;
      color: var(--muted);
      margin-top: 6px;
      text-align: center;
      font-weight: 700;
    }
    .anim-push .anim-icon{animation:ex-bounce 1.6s ease-in-out infinite}
    .anim-pull .anim-icon{animation:ex-swing 2s ease-in-out infinite}
    .anim-squat .anim-icon{animation:ex-squat 2s ease-in-out infinite}
    .anim-hinge .anim-icon{animation:ex-hinge 2.4s ease-in-out infinite}
    .anim-shoulder .anim-icon{animation:ex-swing 2.2s ease-in-out infinite}
    .anim-curl .anim-icon{animation:ex-curl 1.4s ease-in-out infinite}
    .anim-core .anim-icon{animation:ex-pulse 2s ease-in-out infinite}
    .anim-calf .anim-icon{animation:ex-bounce .9s ease-in-out infinite}
    .anim-content {
      flex: 1;
      display: flex;
      flex-direction: column;
      gap: 8px;
    }
    .anim-muscles-row {
      font-size: 0.8rem;
      font-weight: 700;
      padding: 3px 12px;
      border-radius: 100px;
      display: inline-block;
      width: fit-content;
      background: var(--accent-light);
      color: var(--accent);
      border: 1px solid rgba(99, 102, 241, 0.15);
    }
    .anim-steps {
      display: flex;
      flex-direction: column;
      gap: 6px;
    }
    .anim-step {
      display: flex;
      gap: 8px;
      align-items: flex-start;
      font-size: 0.82rem;
      color: var(--text);
      line-height: 1.5;
    }
    .anim-step-num {
      width: 20px;
      height: 20px;
      border-radius: 50%;
      background: var(--accent-light);
      color: var(--accent);
      font-size: 0.72rem;
      font-weight: 700;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
      margin-top: 2px;
    }
    .anim-cues {
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
      margin-top: 4px;
    }
    .anim-cue {
      font-size: 0.72rem;
      font-weight: 600;
      color: var(--green);
      background: var(--green-light);
      border: 1px solid rgba(16, 185, 129, 0.15);
      border-radius: 100px;
      padding: 3px 10px;
    }

    /* Info Tips */
    .tip-box {
      background: var(--accent-light);
      border: 1px solid rgba(99, 102, 241, 0.12);
      border-radius: var(--radius);
      padding: 16px 20px;
      font-size: 0.85rem;
      color: var(--accent);
      font-weight: 600;
      margin-bottom: 24px;
      line-height: 1.5;
    }

    /* Rest Card */
    .rest-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 48px 24px;
      text-align: center;
      margin-bottom: 24px;
      box-shadow: var(--shadow-md);
    }
    .rest-card .icon {
      font-size: 3.5rem;
      margin-bottom: 16px;
    }
    .rest-card h2 {
      font-size: 1.4rem;
      font-weight: 800;
      margin-bottom: 8px;
    }
    .rest-card p {
      color: var(--muted);
      font-size: 0.92rem;
      line-height: 1.6;
    }

    /* Macros Grid & Cards */
    .macro-grid {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 12px;
      margin-bottom: 24px;
    }
    .macro-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 16px;
      text-align: center;
      box-shadow: var(--shadow-md);
      position: relative;
      overflow: hidden;
      transition: transform 0.2s;
    }
    .macro-card:hover {
      transform: translateY(-2px);
    }
    .macro-card::before {
      content: '';
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      height: 4px;
    }
    .macro-card.cal::before { background: var(--accent-gradient); }
    .macro-card.pro::before { background: var(--blue); }
    .macro-card.carb::before { background: var(--green); }
    .macro-card.fat::before { background: var(--accent2-gradient); }
    
    .macro-card .val {
      font-size: 1.4rem;
      font-weight: 900;
      line-height: 1.1;
      margin-bottom: 4px;
    }
    .macro-card .lbl {
      font-size: 0.8rem;
      font-weight: 700;
      color: var(--muted);
      margin-top: 2px;
    }
    .macro-card .tgt {
      font-size: 0.7rem;
      color: var(--muted);
    }
    .macro-card.cal .val { color: var(--accent); }
    .macro-card.pro .val { color: var(--blue); }
    .macro-card.carb .val { color: var(--green); }
    .macro-card.fat .val { color: var(--accent2); }

    .progress-bar {
      height: 6px;
      background: #f1f5f9;
      border-radius: 100px;
      overflow: hidden;
      margin-top: 8px;
    }
    .progress-fill {
      height: 100%;
      border-radius: 100px;
      transition: width 0.6s cubic-bezier(0.4, 0, 0.2, 1);
    }
    .fill-cal { background: var(--accent-gradient); }
    .fill-pro { background: var(--blue); }
    .fill-carb { background: var(--green); }
    .fill-fat { background: var(--accent2-gradient); }

    /* Meal cards */
    .meal-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      margin-bottom: 16px;
      overflow: hidden;
      box-shadow: var(--shadow-md);
    }
    .meal-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 16px 20px;
      background: #f8fafc;
      border-bottom: 1px solid var(--border);
      cursor: pointer;
      user-select: none;
      transition: background 0.2s;
    }
    .meal-header:hover {
      background: #f1f5f9;
    }
    .meal-title {
      font-weight: 800;
      font-size: 0.95rem;
      color: var(--text);
    }
    .meal-cals {
      font-size: 0.82rem;
      color: var(--accent);
      font-weight: 700;
      background: var(--accent-light);
      padding: 2px 10px;
      border-radius: 100px;
    }
    .meal-body {
      padding: 8px 20px 20px;
    }
    .food-row {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 14px 0;
      border-bottom: 1px solid #f1f5f9;
    }
    .food-row:last-child {
      border-bottom: none;
    }
    .food-name {
      flex: 1;
      font-size: 0.9rem;
      font-weight: 700;
      color: var(--text);
    }
    .food-macros {
      font-size: 0.78rem;
      color: var(--muted);
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
      margin-top: 2px;
    }
    .gram-input {
      width: 68px;
      padding: 6px 8px;
      background: #f8fafc;
      border: 1px solid var(--border-dark);
      border-radius: 8px;
      color: var(--text);
      font-family: 'Cairo', sans-serif;
      font-size: 0.85rem;
      font-weight: 600;
      text-align: center;
      transition: all 0.2s;
    }
    .gram-input:focus {
      outline: none;
      border-color: var(--accent);
      background: var(--surface);
      box-shadow: 0 0 0 3px rgba(99, 102, 241, 0.15);
    }
    .swap-btn {
      padding: 6px 12px;
      background: var(--accent-light);
      border: 1px solid rgba(99, 102, 241, 0.12);
      border-radius: 8px;
      color: var(--accent);
      font-family: 'Cairo', sans-serif;
      font-size: 0.78rem;
      font-weight: 700;
      cursor: pointer;
      transition: all 0.2s;
      white-space: nowrap;
    }
    .swap-btn:hover {
      background: var(--accent);
      color: #ffffff;
      border-color: transparent;
    }
    .meal-totals {
      display: flex;
      gap: 16px;
      padding: 14px 0 0;
      font-size: 0.85rem;
      font-weight: 600;
      color: var(--muted);
      border-top: 1px solid #f1f5f9;
      margin-top: 8px;
      flex-wrap: wrap;
    }

    /* Modal Overlay & Modal */
    .modal-overlay {
      position: fixed;
      inset: 0;
      background: rgba(15, 23, 42, 0.3);
      backdrop-filter: blur(8px);
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 100;
      padding: 16px;
      animation: fadeIn 0.2s ease-out;
    }
    @keyframes fadeIn {
      from { opacity: 0; }
      to { opacity: 1; }
    }
    .modal {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 20px;
      padding: 24px;
      width: 100%;
      max-width: 440px;
      max-height: 80vh;
      overflow-y: auto;
      box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.08), 0 10px 10px -5px rgba(0, 0, 0, 0.03);
      animation: slideUp 0.25s cubic-bezier(0.16, 1, 0.3, 1);
    }
    @keyframes slideUp {
      from { transform: translateY(16px); opacity: 0; }
      to { transform: translateY(0); opacity: 1; }
    }
    .modal h3 {
      font-size: 1.1rem;
      font-weight: 800;
      color: var(--text);
      margin-bottom: 16px;
    }
    .option-btn {
      display: block;
      width: 100%;
      padding: 12px 16px;
      margin-bottom: 8px;
      background: #f8fafc;
      border: 1px solid var(--border-dark);
      border-radius: 12px;
      color: var(--text);
      font-family: 'Cairo', sans-serif;
      font-size: 0.9rem;
      font-weight: 600;
      cursor: pointer;
      text-align: right;

        { id:"protein_l",name:"فراخ مشوية",    category:"protein", grams:150, per100g:{cal:165,p:31,c:0, f:4  } },
        { id:"carb_l",   name:"أرز أبيض",      category:"carb",    grams:150, per100g:{cal:130,p:2.5,c:28,f:0.3} },
        { id:"salad_l",  name:"سلطة بزيت",     category:"veg",     grams:150, per100g:{cal:53, p:1, c:4, f:4  } },
      ]},
      dinner:      { label: "🌙 العشاء",          items: [
        { id:"eggs_d",   name:"بيض مسلوق",     category:"protein", grams:100, per100g:{cal:155,p:13,c:1, f:11 } },
        { id:"cheese",   name:"جبن أبيض",       category:"protein", grams:60,  per100g:{cal:183,p:13,c:1, f:14 } },
        { id:"bread_d",  name:"عيش بلدي",      category:"carb",    grams:65,  per100g:{cal:230,p:7.5,c:46,f:1.5} },
        { id:"laban",    name:"لبن رايب",        category:"dairy",   grams:200, per100g:{cal:61, p:3.5,c:5, f:3.3} },
      ]},
    };

    const TARGETS = { cal: 2490, p: 130, c: 335, f: 70 };

    // ============================================================
    // STATE & ENGINE
    // ============================================================
    let activeDay = DAYS[new Date().getDay()];
    let currentTab = "workout"; // "workout" or "food"

    // Expand state for exercises: exName -> true/false
    const openExercises = {};
    // Media tab state for exercises: exName -> "gif" | "video"
    const activeMediaTabs = {};
    // Open/close states for meals: mealKey -> true/false
    const openMeals = {
      breakfast: true,
      preworkout: true,
      postworkout: true,
      lunch: true,
      dinner: true
    };

    // Swap Modal state: null or { mealKey, idx, item }
    let swapTarget = null;

    // Load mealsState from localStorage or initialize
    let mealsState = {};
    try {
      const saved = localStorage.getItem("fitness_tracker_meals");
      if (saved) {
        mealsState = JSON.parse(saved);
      }
    } catch(e) {}

    // Initialize missing days
    DAYS.forEach(d => {
      if (!mealsState[d]) {
        mealsState[d] = {};
        Object.entries(BASE_MEALS).forEach(([k, v]) => {
          mealsState[d][k] = v.items.map(i => ({ ...i }));
        });
      }
    });

    function saveMeals() {
      try {
        localStorage.setItem("fitness_tracker_meals", JSON.stringify(mealsState));
      } catch(e) {}
    }

    function calcItem(item) {
      return {
        cal: Math.round((item.per100g.cal * item.grams) / 100),
        p:   Math.round((item.per100g.p   * item.grams) / 100 * 10) / 10,
        c:   Math.round((item.per100g.c   * item.grams) / 100 * 10) / 10,
        f:   Math.round((item.per100g.f   * item.grams) / 100 * 10) / 10,
      };
    }

    function calcMeal(items) {
      return items.reduce((a, i) => {
        const n = calcItem(i);
        return { cal: a.cal+n.cal, p: a.p+n.p, c: a.c+n.c, f: a.f+n.f };
      }, { cal:0,p:0,c:0,f:0 });
    }

    // ============================================================
    // RENDER CONTROLLER
    // ============================================================
    function renderApp() {
      const root = document.getElementById("root");
      const todayIdx = new Date().getDay();

      const dayPlan = WORKOUT_PLAN[activeDay];
      const exercises = EXERCISES[dayPlan.label] || [];
      const dayMeals = mealsState[activeDay];
      const totals = calcMeal(Object.values(dayMeals).flat());

      const pct = (v, t) => Math.min(100, Math.round((v / t) * 100));

      let contentHtml = `
        <div class="header">
          <h1>💪 مدرّبك الشخصي</h1>
          <p>Upper / Lower | استك + وزن جسم | Lean Bulk 2,490 سعرة</p>
        </div>

        <div class="day-tabs">
          ${DAYS.map(d => `
            <button class="day-tab ${WORKOUT_PLAN[d].type === "rest" ? "rest" : ""} ${activeDay === d ? "active" : ""}" onclick="setActiveDay('${d}')">
              ${d}${d === DAYS[todayIdx] ? " 🔴" : ""}
            </button>
          `).join("")}
        </div>

        <div class="tab-row">
          <button class="tab-btn ${currentTab === "workout" ? "active" : ""}" onclick="setTab('workout')">🏋️ التمرين</button>
          <button class="tab-btn ${currentTab === "food" ? "active" : ""}" onclick="setTab('food')">🥗 التغذية</button>
        </div>
      `;

      if (currentTab === "workout") {
        contentHtml += `
          <div class="workout-header">
            <div>
              <div style="font-weight:700; font-size:1.05rem; margin-bottom:4px">${dayPlan.label}</div>
              <div style="font-size:.82rem; color:var(--muted)">${dayPlan.sub}</div>
            </div>
            <span class="workout-badge badge-${dayPlan.type}">
              ${dayPlan.type === "upper" ? "Upper Body" : dayPlan.type === "lower" ? "Lower Body" : "Rest Day"}
            </span>
          </div>
        `;

        if (dayPlan.type === "rest") {
          contentHtml += `
            <div class="rest-card">
              <div class="icon">😴</div>
              <h2>يوم راحة واستشفاء</h2>
              <p>جسمك بيبني العضلات في أيام الراحة<br />نام كويس واشرب مياه</p>
            </div>
          `;
        } else {
          contentHtml += `
            <div class="section-title">📋 تمارين اليوم — اضغط "شوف الحركة" لأي تمرين</div>
            <div class="ex-list">
              ${exercises.map((ex, i) => {
                const isOpen = openExercises[ex.name] || false;
                const media = EXERCISE_MEDIA[ex.name];
                const activeTab = activeMediaTabs[ex.name] || "gif";

                let mediaHtml = "";
                if (isOpen && media) {
                  mediaHtml = `
                    <div class="ex-media">
                      <div class="media-tabs">
                        <button class="media-tab ${activeTab === "gif" ? "active" : ""}" onclick="setMediaTab('${ex.name}', 'gif')">🖼️ صورة متحركة</button>
                        <button class="media-tab ${activeTab === "video" ? "active" : ""}" onclick="setMediaTab('${ex.name}', 'video')">▶️ فيديو قصير</button>
                      </div>
                      ${activeTab === "gif" ? `
                        ${media.gif || media.online_gif ? `
                          <div class="gif-wrap">
                            <img 
                              src="${media.gif || media.online_gif}" 
                              alt="${ex.name}" 
                              referrerpolicy="no-referrer"
                              crossorigin="anonymous"
                              data-fallback="${media.online_gif || ''}"
                              onerror="handleImageError(this)"
                              style="max-width:100%;border-radius:10px;"
                            />
                          </div>
                        ` : `
                          <div class="ex-anim-card anim-${media.type || 'push'}">
                            <div class="anim-icon-area">
                              <span class="anim-icon">${media.icon || '💪'}</span>
                            </div>
                            <div class="anim-content">
                              <div class="anim-muscles-row">${media.muscles || ''}</div>
                            </div>
                          </div>
                        `}
                      ` : `
                        <div class="video-wrap">
                          <iframe src="${media.video}" title="${ex.name}" allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture; web-share" allowfullscreen></iframe>
                        </div>
                      `}
                      <div class="ex-details">
                        <span>🔢 ${ex.sets} سيتات</span>
                        <span>🔄 ${ex.reps} تكرار</span>
                        <span>⏱️ راحة ${ex.rest}</span>
                        <span>💪 ${ex.muscles}</span>
                      </div>
                    </div>
                  `;
                }

                return `
                  <div class="ex-card ${isOpen ? "open" : ""}">
                    <div class="ex-header" onclick="toggleExercise('${ex.name}')">
                      <div class="ex-num">${i + 1}</div>
                      <div class="ex-info">
                        <div class="ex-name">${ex.name}</div>
                        <div class="ex-meta">
                          <span class="muscle-tag">${ex.muscles}</span>
                          <span class="tool-tag">${ex.tool}</span>
                        </div>
                      </div>
                      <div class="ex-stats">
                        <div class="stat-pill"><strong>${ex.sets}</strong><span>سيتات</span></div>
                        <div class="stat-pill"><strong>${ex.reps}</strong><span>تكرار</span></div>
                        <div class="stat-pill"><strong>${ex.rest}</strong><span>راحة</span></div>
                      </div>
                      ${media ? `
                        <button class="ex-expand-btn ${isOpen ? "active" : ""}">
                          ${isOpen ? "إخفاء ▲" : "شوف الحركة ▼"}
                        </button>
                      ` : ""}
                    </div>
                    ${mediaHtml}
                  </div>
                `;
              }).join("")}
            </div>
            <div class="tip-box">
              💡 ابدأ بإحماء 5 دقائق — مشي في المكان + دوران مفاصل. ركز على الشكل الصحيح قبل زيادة التكرارات.
            </div>
          `;
        }
      } else {
        // Tab: Food
        contentHtml += `
          <div class="section-title">📊 ملخص اليوم</div>
          <div style="margin-bottom:24px">
            <div class="macro-grid">
              ${[
                { cls:"cal", val: totals.cal,        lbl:"سعرات",  tgt: TARGETS.cal,  fill:"fill-cal",  unit:"" },
                { cls:"pro", val: Math.round(totals.p), lbl:"بروتين", tgt: TARGETS.p,   fill:"fill-pro",  unit:"غ" },
                { cls:"carb",val: Math.round(totals.c), lbl:"كارب",   tgt: TARGETS.c,   fill:"fill-carb", unit:"غ" },
                { cls:"fat", val: Math.round(totals.f), lbl:"دهون",   tgt: TARGETS.f,   fill:"fill-fat",  unit:"غ" },
              ].map(m => `
                <div class="macro-card ${m.cls}">
                  <div class="val">${m.val}${m.unit}</div>
                  <div class="lbl">${m.lbl}</div>
                  <div class="tgt">الهدف: ${m.tgt}${m.unit}</div>
                  <div class="progress-bar">
                    <div class="progress-fill ${m.fill}" style="width: ${pct(m.val, m.tgt)}%"></div>
                  </div>
                </div>
              `).join("")}
            </div>
          </div>

          <div class="section-title">🍽️ وجباتك — غيّر الجرام أو اضغط "تغيير" لتبديل الأكل</div>
          ${Object.entries(BASE_MEALS).map(([mealKey, meal]) => {
            const items = dayMeals[mealKey];
            const mealTotals = calcMeal(items);
            const isOpen = openMeals[mealKey];

            let bodyHtml = "";
            if (isOpen) {
              bodyHtml = `
                <div class="meal-body">
                  ${items.map((item, idx) => {
                    const n = calcItem(item);
                    const canSwap = item.category === "carb" || item.category === "protein";
                    return `
                      <div class="food-row">
                        <div style="flex:1">
                          <div class="food-name">${item.name}</div>
                          <div class="food-macros">
                            <span>🔥 ${n.cal}</span><span>💪 ${n.p}غ</span><span>🌾 ${n.c}غ</span><span>🧈 ${n.f}غ</span>
                          </div>
                        </div>
                        <input class="gram-input" type="number" value="${item.grams}" min="0" onchange="handleGramChange('${mealKey}', ${idx}, this.value)" />
                        <span style="font-size:.72rem; color:var(--muted); margin-left:8px">غ</span>
                        ${canSwap ? `<button class="swap-btn" onclick="openSwapModal('${mealKey}', ${idx})">تغيير</button>` : ""}
                      </div>
                    `;
                  }).join("")}
                  <div class="meal-totals">
                    <span>المجموع: <strong style="color:var(--accent)">${mealTotals.cal} سعرة</strong></span>
                    <span>بروتين: <strong style="color:#3a7bd5">${Math.round(mealTotals.p)}غ</strong></span>
                    <span>كارب: <strong style="color:var(--green)">${Math.round(mealTotals.c)}غ</strong></span>
                    <span>دهون: <strong style="color:var(--accent2)">${Math.round(mealTotals.f)}غ</strong></span>
                  </div>
                </div>
              `;
            }

            return `
              <div class="meal-card">
                <div class="meal-header" onclick="toggleMeal('${mealKey}')">
                  <span class="meal-title">${meal.label}</span>
                  <div style="display:flex; align-items:center; gap:10px">
                    <span class="meal-cals">${mealTotals.cal} سعرة</span>
                    <span style="color:var(--muted); font-size:.8rem">${isOpen ? "▲" : "▼"}</span>
                  </div>
                </div>
                ${bodyHtml}
              </div>
            `;
          }).join("")}
        `;
      }

      // Add Swap Modal if open
      if (swapTarget) {
        const item = swapTarget.item;
        const options = item.category === "carb" ? CARB_OPTIONS : item.category === "protein" ? PROTEIN_OPTIONS : null;
        if (options) {
          contentHtml += `
            <div class="modal-overlay" onclick="closeSwapModal()">
              <div class="modal" onclick="event.stopPropagation()">
                <h3>استبدل "${item.name}"</h3>
                ${options.map(o => `
                  <button class="option-btn" onclick="handleSwap('${swapTarget.mealKey}', ${swapTarget.idx}, '${o.name}')">
                    <div style="font-weight: 700">${o.name}</div>
                    <div style="font-size: .75rem; color: #8892a4; margin-top: 3px">
                      ${o.per100g.cal} سعرة | بروتين ${o.per100g.p}غ | كارب ${o.per100g.c}غ | دهون ${o.per100g.f}غ — لكل 100غ
                    </div>
                  </button>
                `).join("")}
                <button class="close-btn" onclick="closeSwapModal()">إلغاء</button>
              </div>
            </div>
          `;
        }
      }

      root.innerHTML = contentHtml;
    }

    // ============================================================
    // STATE ACTIONS (GLOBAL SCOPE FOR ONCLICK)
    // ============================================================
    window.setActiveDay = function(day) {
      activeDay = day;
      renderApp();
    };

    window.setTab = function(tab) {
      currentTab = tab;
      renderApp();
    };

    window.toggleExercise = function(exName) {
      openExercises[exName] = !openExercises[exName];
      renderApp();
    };

    window.setMediaTab = function(exName, tabType) {
      activeMediaTabs[exName] = tabType;
      renderApp();
    };

    window.handleImageError = function(img) {
      // Try fallback URL from data-fallback attribute
      const fallback = img.getAttribute('data-fallback');
      const triedFallback = img.getAttribute('data-tried-fallback');

      if (fallback && !triedFallback) {
        img.setAttribute('data-tried-fallback', 'true');
        img.src = fallback;
        return;
      }

      // All sources failed — show CSS animation placeholder
      const wrap = img.closest('.gif-wrap') || img.parentElement;
      const name = img.alt || 'تمرين';
      wrap.innerHTML = `
        <div style="
          background: linear-gradient(135deg, #f8fafc, #f1f5f9);
          border: 1px solid #e2e8f0;
          border-radius: 12px;
          padding: 30px 20px;
          text-align: center;
          color: #64748b;
        ">
          <div style="font-size:3rem;margin-bottom:10px;">🏋️</div>
          <div style="font-weight:700;color:#0f172a;margin-bottom:6px;">${name}</div>
          <div style="font-size:0.85rem;color:#64748b;">شاهد الفيديو للتعرف على الحركة</div>
        </div>
      `;
    };

    window.handleImageFallback = function(img, onlineUrl) {
      if (img.getAttribute('data-tried-online') === 'true') {
        window.handleImageError(img);
      } else {
        img.setAttribute('data-tried-online', 'true');
        img.src = onlineUrl;
      }
    };

    window.toggleMeal = function(mealKey) {
      openMeals[mealKey] = !openMeals[mealKey];
      renderApp();
    };

    window.handleGramChange = function(mealKey, idx, val) {
      const g = Math.max(0, parseInt(val) || 0);
      mealsState[activeDay][mealKey][idx].grams = g;
      saveMeals();
      renderApp();
    };

    window.openSwapModal = function(mealKey, idx) {
      const item = mealsState[activeDay][mealKey][idx];
      swapTarget = { mealKey, idx, item };
      renderApp();
    };

    window.closeSwapModal = function() {
      swapTarget = null;
      renderApp();
    };

    window.handleSwap = function(mealKey, idx, optName) {
      const item = mealsState[activeDay][mealKey][idx];
      const options = item.category === "carb" ? CARB_OPTIONS : PROTEIN_OPTIONS;
      const opt = options.find(o => o.name === optName);
      if (opt) {
        item.name = opt.name;
        item.per100g = { ...opt.per100g };
        saveMeals();
      }
      swapTarget = null;
      renderApp();
    };

    // First render
    renderApp();
  </script>
</body>
</html>
